name: One-shot fix GG V2 test2 compatibility

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix-build-deploy:
    if: github.head_ref == 'v2-server-authoritative'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: v2-server-authoritative
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LICENSE_ADMIN_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
    steps:
      - name: Checkout latest V2 branch
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q origin main "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply Android and Worker compatibility fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          root = Path('.')
          java = root / 'v2/android/client/src/main/java/com/jinli/ggsecure'

          (java / 'RuntimeKeyManager.java').write_text(r'''package com.jinli.ggsecure;

import android.security.keystore.KeyGenParameterSpec;
import android.security.keystore.KeyProperties;
import android.util.Base64;

import java.security.KeyPairGenerator;
import java.security.KeyStore;
import java.security.MessageDigest;
import java.security.PrivateKey;
import java.security.PublicKey;
import java.security.spec.MGF1ParameterSpec;

import javax.crypto.Cipher;
import javax.crypto.spec.OAEPParameterSpec;
import javax.crypto.spec.PSource;

final class RuntimeKeyManager {
    static final String ALGORITHM = "RSA-OAEP-SHA1";
    private static final String ALIAS = "gg_v2_runtime_rsa_oaep_sha1_2";

    String publicKeyBase64() throws Exception {
        return Base64.encodeToString(publicKey().getEncoded(), Base64.NO_WRAP);
    }

    String fingerprint() throws Exception {
        return DeviceIdentity.hex(MessageDigest.getInstance("SHA-256").digest(publicKey().getEncoded()));
    }

    byte[] unwrapKey(byte[] wrapped) throws Exception {
        KeyStore keyStore = keyStore();
        PrivateKey privateKey = (PrivateKey) keyStore.getKey(ALIAS, null);
        if (privateKey == null) {
            ensureKeyPair();
            privateKey = (PrivateKey) keyStore().getKey(ALIAS, null);
        }
        Cipher cipher = Cipher.getInstance("RSA/ECB/OAEPWithSHA-1AndMGF1Padding");
        OAEPParameterSpec spec = new OAEPParameterSpec(
                "SHA-1", "MGF1", MGF1ParameterSpec.SHA1, PSource.PSpecified.DEFAULT);
        cipher.init(Cipher.DECRYPT_MODE, privateKey, spec);
        return cipher.doFinal(wrapped);
    }

    private PublicKey publicKey() throws Exception {
        KeyStore store = keyStore();
        java.security.cert.Certificate certificate = store.getCertificate(ALIAS);
        if (certificate == null) {
            ensureKeyPair();
            certificate = keyStore().getCertificate(ALIAS);
        }
        if (certificate == null) throw new IllegalStateException("无法创建运行密钥");
        return certificate.getPublicKey();
    }

    private void ensureKeyPair() throws Exception {
        KeyPairGenerator generator = KeyPairGenerator.getInstance(
                KeyProperties.KEY_ALGORITHM_RSA, "AndroidKeyStore");
        generator.initialize(new KeyGenParameterSpec.Builder(
                ALIAS,
                KeyProperties.PURPOSE_ENCRYPT | KeyProperties.PURPOSE_DECRYPT)
                .setKeySize(2048)
                .setDigests(KeyProperties.DIGEST_SHA1)
                .setEncryptionPaddings(KeyProperties.ENCRYPTION_PADDING_RSA_OAEP)
                .setUserAuthenticationRequired(false)
                .build());
        generator.generateKeyPair();
    }

    private KeyStore keyStore() throws Exception {
        KeyStore keyStore = KeyStore.getInstance("AndroidKeyStore");
        keyStore.load(null);
        return keyStore;
    }
}
''', encoding='utf-8')

