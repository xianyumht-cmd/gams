          (java / 'RuntimeTransport.java').write_text(r'''package com.jinli.ggsecure;

import java.io.ByteArrayOutputStream;
import java.io.IOException;
import java.io.InputStream;
import java.io.OutputStream;
import java.net.URL;
import java.nio.charset.StandardCharsets;
import java.util.ArrayList;
import java.util.List;
import java.util.Locale;

import javax.net.ssl.HttpsURLConnection;

final class RuntimeTransport {
    private static final int CONNECT_TIMEOUT_MS = 8000;
    private static final int READ_TIMEOUT_MS = 30000;
    private static final String[] HOSTS = {
            RuntimeNames.runtimeCustomHost(),
            RuntimeNames.runtimeWorkerHost()
    };

    private RuntimeTransport() { }

    static Response postJson(String path, String json, int maximumBytes) throws IOException {
        return requestAcrossHosts(
                "POST", path, json.getBytes(StandardCharsets.UTF_8), "", maximumBytes, true);
    }

    static byte[] getBytes(String path, String authorization, int maximumBytes) throws IOException {
        Response response = requestAcrossHosts(
                "GET", path, null, authorization, maximumBytes, false);
        if (response.status < 200 || response.status >= 300) {
            throw new IOException("运行服务返回 HTTP " + response.status);
        }
        return response.body;
    }

    private static Response requestAcrossHosts(
            String method,
            String path,
            byte[] requestBody,
            String authorization,
            int maximumBytes,
            boolean expectJson
    ) throws IOException {
        List<String> failures = new ArrayList<>();
        for (String host : HOSTS) {
            try {
                Response response = requestHost(
                        host, method, path, requestBody, authorization, maximumBytes);
                if (isExpectedResponse(response, expectJson)) return response;
                failures.add(host + ": HTTP " + response.status + " 类型 " + response.contentType);
            } catch (IOException error) {
                failures.add(host + ": " + shortMessage(error));
            }
        }
        throw new IOException("运行服务器连接失败：" + String.join("；", failures));
    }

    private static boolean isExpectedResponse(Response response, boolean expectJson) {
        String type = response.contentType.toLowerCase(Locale.ROOT);
        if (expectJson) {
            if (!type.contains("application/json")) return false;
            String text = response.bodyText().trim();
            return text.startsWith("{") && text.endsWith("}");
        }
        if (response.status >= 200 && response.status < 300) {
            return type.contains("application/octet-stream");
        }
        return type.contains("application/json");
    }

    private static Response requestHost(
            String host,
            String method,
            String path,
            byte[] requestBody,
            String authorization,
            int maximumBytes
    ) throws IOException {
        HttpsURLConnection connection = (HttpsURLConnection) new URL(
                "https://" + host + path).openConnection();
        connection.setConnectTimeout(CONNECT_TIMEOUT_MS);
        connection.setReadTimeout(READ_TIMEOUT_MS);
        connection.setRequestMethod(method);
        connection.setUseCaches(false);
        connection.setDefaultUseCaches(false);
        connection.setInstanceFollowRedirects(false);
        connection.setRequestProperty("Accept", "application/json, application/octet-stream");
        connection.setRequestProperty("Cache-Control", "no-store, no-cache, max-age=0");
        connection.setRequestProperty("Pragma", "no-cache");
        connection.setRequestProperty("User-Agent", "GG-V2/2 Android");
        if (authorization != null && !authorization.isEmpty()) {
            connection.setRequestProperty("Authorization", authorization);
        }
        if (requestBody != null) {
            connection.setDoOutput(true);
            connection.setRequestProperty("Content-Type", "application/json; charset=utf-8");
            connection.setFixedLengthStreamingMode(requestBody.length);
            try (OutputStream output = connection.getOutputStream()) {
                output.write(requestBody);
            }
        }
        try {
            int status = connection.getResponseCode();
            InputStream source = status >= 200 && status < 400
                    ? connection.getInputStream() : connection.getErrorStream();
            byte[] body = source == null ? new byte[0] : readLimited(source, maximumBytes);
            return new Response(status, body, connection.getHeaderField("Content-Type"));
        } finally {
            connection.disconnect();
        }
    }

    private static byte[] readLimited(InputStream input, int maximumBytes) throws IOException {
        try (InputStream source = input; ByteArrayOutputStream output = new ByteArrayOutputStream()) {
            byte[] buffer = new byte[8192];
            int total = 0;
            int read;
            while ((read = source.read(buffer)) != -1) {
                total += read;
                if (total > maximumBytes) throw new IOException("运行服务响应过大");
                output.write(buffer, 0, read);
            }
            return output.toByteArray();
        }
    }

    private static String shortMessage(Throwable error) {
        String message = error.getMessage();
        if (message == null || message.trim().isEmpty()) return error.getClass().getSimpleName();
        return message.length() > 100 ? message.substring(0, 100) : message;
    }

    static final class Response {
        final int status;
        final byte[] body;
        final String contentType;

        Response(int status, byte[] body, String contentType) {
            this.status = status;
            this.body = body;
            this.contentType = contentType == null ? "" : contentType;
        }

        String bodyText() {
            return new String(body, StandardCharsets.UTF_8);
        }
    }
}
''', encoding='utf-8')

          manager = java / 'V2LicenseManager.java'
          text = manager.read_text(encoding='utf-8')
          replacements = {
              '.put("runtimePublicKey", runtimePublicKey)\n                .put("runtimeKeyFingerprint", runtimeFingerprint);':
              '.put("runtimePublicKey", runtimePublicKey)\n                .put("runtimeKeyFingerprint", runtimeFingerprint)\n                .put("runtimeKeyAlgorithm", RuntimeKeyManager.ALGORITHM);',
              '客户端：2.0.0-test1': '客户端：2.0.0-test2',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'V2LicenseManager patch target missing: {old}')
              text = text.replace(old, new, 1)
          manager.write_text(text, encoding='utf-8')

          gradle = root / 'v2/android/client/build.gradle.kts'
          text = gradle.read_text(encoding='utf-8')
          for old, new in [('versionCode = 1', 'versionCode = 2'),
                           ('versionName = "2.0.0-test1"', 'versionName = "2.0.0-test2"')]:
              if old not in text:
                  raise SystemExit(f'build.gradle patch target missing: {old}')
              text = text.replace(old, new, 1)
          gradle.write_text(text, encoding='utf-8')

          worker = root / 'v2/runtime/src/index.js'
          text = worker.read_text(encoding='utf-8')
          old = '''  const runtimePublicKey = text(body.runtimePublicKey, 8192);\n  const runtimeFingerprint = normalizeHex64(body.runtimeKeyFingerprint);\n  if (!runtimePublicKey || !runtimeFingerprint) {\n    throw new HttpError(400, "bad_runtime_key", "V2运行密钥无效");\n  }'''
          new = '''  const runtimePublicKey = text(body.runtimePublicKey, 8192);\n  const runtimeFingerprint = normalizeHex64(body.runtimeKeyFingerprint);\n  const runtimeKeyAlgorithm = text(body.runtimeKeyAlgorithm, 32);\n  if (!runtimePublicKey || !runtimeFingerprint) {\n    throw new HttpError(400, "bad_runtime_key", "V2运行密钥无效");\n  }\n  if (runtimeKeyAlgorithm !== "RSA-OAEP-SHA1") {\n    throw new HttpError(400, "bad_runtime_key_algorithm", "V2运行密钥算法不兼容，请更新客户端");\n  }'''
          if old not in text:
              raise SystemExit('worker runtime-key validation target missing')
          text = text.replace(old, new, 1)
          old = '{ name: "RSA-OAEP", hash: "SHA-256" }'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one worker RSA-OAEP SHA-256 import, got {text.count(old)}')
          text = text.replace(old, '{ name: "RSA-OAEP", hash: "SHA-1" }', 1)
          text = text.replace('version: 1,\n          minAppVersion:', 'version: 2,\n          keyWrap: "RSA-OAEP-SHA1",\n          minAppVersion:', 1)
          text = text.replace('runtimeKey: runtimeFingerprint.slice(0, 16),',
                              'runtimeKey: runtimeFingerprint.slice(0, 16),\n    runtimeKeyAlgorithm,', 1)
          worker.write_text(text, encoding='utf-8')

          wrangler = root / 'v2/runtime/wrangler.template.jsonc'
          config = json.loads(wrangler.read_text(encoding='utf-8'))
          config['routes'] = [{
              'pattern': 'runtime.xn--8pv109c.top',
              'custom_domain': True,
          }]
          wrangler.write_text(json.dumps(config, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          readme = root / 'v2/README.md'
          text = readme.read_text(encoding='utf-8')
          text += '\n## Test2 compatibility fix\n\n- Android RSA-OAEP key wrapping uses SHA-1/MGF1-SHA1 for older Android Keystore compatibility.\n- Runtime traffic prefers `runtime.xn--8pv109c.top` and falls back to `workers.dev`.\n- V1 version 8 remains unchanged.\n'
          readme.write_text(text, encoding='utf-8')
          PY

      - name: Static validation
        shell: bash
        run: |
          set -euo pipefail
          node --check v2/runtime/src/index.js
          grep -q 'RSA/ECB/OAEPWithSHA-1AndMGF1Padding' v2/android/client/src/main/java/com/jinli/ggsecure/RuntimeKeyManager.java
          grep -q 'MGF1ParameterSpec.SHA1' v2/android/client/src/main/java/com/jinli/ggsecure/RuntimeKeyManager.java
          grep -q 'runtime.xn--8pv109c.top' v2/runtime/wrangler.template.jsonc
          grep -q 'versionCode = 2' v2/android/client/build.gradle.kts
          grep -q 'versionName = "2.0.0-test2"' v2/android/client/build.gradle.kts

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build fixed V2 client
        working-directory: v2/android
        run: gradle --no-daemon :client:assembleRelease

      - name: Inspect and package APK
        shell: bash
        run: |
          set -euo pipefail
          apk='v2/android/client/build/outputs/apk/release/client-release.apk'
          test -s "$apk"
          rm -rf /tmp/v2-client /tmp/v2-test2
          mkdir -p /tmp/v2-client /tmp/v2-test2
          unzip -q "$apk" -d /tmp/v2-client
          if find /tmp/v2-client -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo 'JavaScript file found in V2 APK'
            exit 1
          fi
          for marker in webpackChunk_lodash_modules SAL_getUserData createBuyOrder get_goods_list '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/v2-client; then
              echo "Core implementation marker found: $marker"
              exit 1
            fi
          done
          cp "$apk" '/tmp/v2-test2/GG-V2-客户端-2.0.0-test2.apk'
          sha256sum /tmp/v2-test2/*.apk > /tmp/v2-test2/SHA256SUMS.txt

      - name: Deploy runtime custom domain and SHA1 key wrapping
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          test -n "${LICENSE_ADMIN_PASSWORD:-}"
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database"
          response="$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api?per_page=100")"
          database_id="$(printf '%s' "$response" | jq -r '.result[] | select(.name=="gams-license-db") | (.uuid // .id)' | head -n1)"
          test -n "$database_id" && test "$database_id" != 'null'
          sed "s/__D1_DATABASE_ID__/${database_id}/g" \
            v2/runtime/wrangler.template.jsonc > v2/runtime/wrangler.generated.jsonc
          cd v2/runtime
          printf '%s' "$LICENSE_ADMIN_PASSWORD" \
            | npx --yes wrangler@4 secret put ADMIN_PASSWORD --config wrangler.generated.jsonc
          npx --yes wrangler@4 deploy --config wrangler.generated.jsonc

      - name: Verify both runtime channels
        shell: bash
        run: |
          set -euo pipefail
          for endpoint in \
            'https://runtime.xn--8pv109c.top' \
            'https://gams-runtime-v2.2320006072.workers.dev'; do
            ready=0
            for attempt in $(seq 1 60); do
              status="$(curl --silent --show-error --output /tmp/v2-health.json --write-out '%{http_code}' "$endpoint/health" || true)"
              if [[ "$status" == '200' ]] \
                && jq -e '.ok == true and .service == "gams-runtime-v2" and .version == 2 and .keyWrap == "RSA-OAEP-SHA1"' /tmp/v2-health.json >/dev/null; then
                ready=1
                break
              fi
              sleep 5
            done
            test "$ready" = 1
            challenge="$(jq -n '{deviceId:("a"*64),purpose:"runtime",appVersion:9}')"
            curl -fsS -X POST -H 'Content-Type: application/json' \
              --data "$challenge" "$endpoint/v2/runtime/challenge" \
              | jq -e '.ok == true and .purpose == "runtime" and (.nonce|length) > 20' >/dev/null
          done
          cat > /tmp/v2-test2/TEST-RESULT.txt <<'EOF'
          Android compile: passed
          APK plaintext core scan: passed
          Android key wrap: RSA-OAEP SHA-1 / MGF1 SHA-1
          Primary runtime channel: https://runtime.xn--8pv109c.top
          Fallback runtime channel: workers.dev
          Both health checks: passed
          Both POST challenge checks: passed
          V1 version 8: unchanged
          EOF

      - name: Commit successful fix to V2 branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f v2/runtime/wrangler.generated.jsonc
          git add v2/android/client v2/runtime/src/index.js v2/runtime/wrangler.template.jsonc v2/README.md
          git commit -m 'Fix V2 Android OAEP compatibility and add direct runtime domain'
          git fetch -q origin "${TARGET_BRANCH}"
          git rebase "origin/${TARGET_BRANCH}"
          git push origin HEAD:"${TARGET_BRANCH}"

      - uses: actions/upload-artifact@v4
        with:
          name: GG-V2-client-2.0.0-test2
          path: /tmp/v2-test2/*
          retention-days: 30
          if-no-files-found: error
