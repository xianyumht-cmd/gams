name: Scan alert fragments and service-worker paths
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-scan-alert-fragments.yml]
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Scan
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import html,json,re,urllib.parse,urllib.request
          from pathlib import Path
          target='https://m.66rpg.com/h5/1690283?ohp=v3&quality=32'
          headers={'User-Agent':'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/125 Mobile Safari/537.36'}
          def get(url):
            req=urllib.request.Request(url,headers=headers)
            with urllib.request.urlopen(req,timeout=45) as r:return r.read(24*1024*1024),r.geturl()
          page,final=get(target);text=page.decode('utf-8','replace')
          urls=[]
          for src in re.findall(r'<script\b[^>]*\bsrc\s*=\s*["\']([^"\']+)["\']',text,re.I):
            url=urllib.parse.urljoin(final,html.unescape(src).strip())
            if url not in urls:urls.append(url)
          needles=['脚本','加载','完成','\\u811a\\u672c','\\u52a0\\u8f7d','\\u5b8c\\u6210','serviceWorker','navigator.serviceWorker','caches.open','CacheStorage','blob:','createObjectURL','脚本加载完成~']
          result=[]
          sources=[('page',final,page)]
          for url in urls:
            try: body,actual=get(url);sources.append(('script',actual,body))
            except Exception as e: result.append({'url':url,'error':repr(e)})
          for kind,url,body in sources:
            decoded=body.decode('utf-8','replace')
            hits={n:decoded.count(n) for n in needles if decoded.count(n)}
            if hits: result.append({'kind':kind,'url':url,'size':len(body),'hits':hits})
          report={'target':target,'result':result}
          Path('docs/diagnostics').mkdir(parents=True,exist_ok=True)
          Path('docs/diagnostics/alert-fragments-and-service-worker-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-scan-alert-fragments.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record alert fragment and service-worker scan'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
