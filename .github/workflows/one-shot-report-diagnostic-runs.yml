name: Report diagnostic workflow runs
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-report-diagnostic-runs.yml]
permissions:
  actions: read
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Query workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" > /tmp/runs.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/runs.json').read_text())
          wanted={
            'dae36b76c7bd5a48065bd19ebea5f5410b8650db',
            'dc3995d9cfa74a6dbffb44a57d8d7aef59a1df30',
            '5d8c3822581b2f9800cc2922c4c81c71d311629f',
          }
          rows=[]
          for run in data.get('workflow_runs',[]):
            if run.get('head_sha') in wanted or 'alert' in run.get('name','').lower() or 'engine loader' in run.get('name','').lower():
              rows.append({k:run.get(k) for k in ['id','name','head_sha','status','conclusion','event','html_url','created_at','updated_at']})
          Path('docs/diagnostics').mkdir(parents=True,exist_ok=True)
          Path('docs/diagnostics/diagnostic-workflow-runs-20260723.json').write_text(json.dumps(rows,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(rows,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-report-diagnostic-runs.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record diagnostic workflow run states'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
