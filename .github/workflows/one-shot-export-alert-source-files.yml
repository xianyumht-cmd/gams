name: Export GG alert source files

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-export-alert-source-files.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Prepare source files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/gg-alert-source
          cp remote-script/release/noname-1.1.2.js /tmp/gg-alert-source/
          cp game-engine/release/game-1.0.4.js /tmp/gg-alert-source/
          sha256sum /tmp/gg-alert-source/* > /tmp/gg-alert-source/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: gg-alert-source-files
          path: /tmp/gg-alert-source/*
          retention-days: 7
      - name: Publish artifact locator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          printf '{"run_id":%s,"artifact_name":"gg-alert-source-files","head_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > diagnostics/alert-source-artifact.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/alert-source-artifact.json
          git commit -m "Record alert source artifact locator"
          git pull --rebase origin main
          git push origin HEAD:main
