name: Collect diagnostic failure logs
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-collect-diagnostic-failures.yml]
permissions:
  actions: read
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Download failed job logs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/logs docs/diagnostics
          for id in 88989660597 88988524141; do
            curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${id}/logs" -o "/tmp/logs/${id}.txt"
          done
          python3 - <<'PY'
          import json
          from pathlib import Path
          report={}
          for p in Path('/tmp/logs').glob('*.txt'):
            text=p.read_text(encoding='utf-8-sig',errors='replace')
            lines=text.splitlines()
            errors=[line for line in lines if 'Error' in line or 'error' in line or '##[error]' in line or 'failed' in line.lower()]
            report[p.stem]={'tail':'\n'.join(lines[-120:]),'errorLines':errors[-80:]}
          Path('docs/diagnostics/diagnostic-failure-logs-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-collect-diagnostic-failures.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record diagnostic workflow failure tails'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
