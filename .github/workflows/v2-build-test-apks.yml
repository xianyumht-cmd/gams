name: Build GG V2 test APKs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v2-server-authoritative
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build V2 release APKs
        working-directory: v2/android
        run: gradle --no-daemon :client:assembleRelease :manager:assembleRelease

      - name: Verify packages and core leakage
        shell: bash
        run: |
          set -euo pipefail
          client="v2/android/client/build/outputs/apk/release/client-release.apk"
          manager="v2/android/manager/build/outputs/apk/release/manager-release.apk"
          test -s "$client"
          test -s "$manager"
          mkdir -p /tmp/v2-client /tmp/v2-manager /tmp/v2-output
          unzip -q "$client" -d /tmp/v2-client
          unzip -q "$manager" -d /tmp/v2-manager

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          aapt_bin="$(find "$sdk_root/build-tools" -type f -name aapt -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          test -x "$aapt_bin"
          "$aapt_bin" dump badging "$client" | grep -q "package: name='com.jinli.ggsecure'"
          "$aapt_bin" dump badging "$manager" | grep -q "package: name='com.jinli.ggsecure.manager'"

          for marker in webpackChunk_lodash_modules SAL_getUserData createBuyOrder get_goods_list '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/v2-client; then
              echo "Core implementation marker found in V2 client APK: $marker"
              exit 1
            fi
          done
          if find /tmp/v2-client -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo "JavaScript file found in V2 client APK"
            exit 1
          fi

          cp "$client" /tmp/v2-output/GG-V2-客户端-2.0.0-test1.apk
          cp "$manager" /tmp/v2-output/GG-V2-管理器-2.0.0-test1.apk
          sha256sum /tmp/v2-output/*.apk > /tmp/v2-output/SHA256SUMS.txt
          cat > /tmp/v2-output/SECURITY-CHECK.txt <<'EOF'
          Core JavaScript assets: absent
          Known plaintext core implementation markers: absent
          Runtime core delivery: encrypted native-memory channel
          V1 version 8: unchanged
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: GG-V2-client-and-manager-2.0.0-test1
          path: /tmp/v2-output/*
          retention-days: 30
          if-no-files-found: error
