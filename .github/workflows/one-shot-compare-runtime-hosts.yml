name: Compare runtime hosts
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-compare-runtime-hosts.yml]
permissions:
  contents: write
jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Compare online runtime endpoints
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib,json,urllib.request,urllib.error
          from pathlib import Path
          hosts=['https://runtime.xn--8pv109c.top','https://gams-runtime-v2.2320006072.workers.dev']
          report=[]
          for host in hosts:
            for path in ['/health','/']:
              req=urllib.request.Request(host+path,headers={'User-Agent':'GG-V2/3 Android','Cache-Control':'no-store','Pragma':'no-cache'})
              item={'url':host+path}
              try:
                with urllib.request.urlopen(req,timeout=30) as r:
                  body=r.read(1024*1024)
                  item.update({'status':r.status,'finalUrl':r.geturl(),'headers':dict(r.headers),'body':body.decode('utf-8','replace'),'sha256':hashlib.sha256(body).hexdigest()})
              except urllib.error.HTTPError as e:
                body=e.read();item.update({'status':e.code,'headers':dict(e.headers),'body':body.decode('utf-8','replace'),'sha256':hashlib.sha256(body).hexdigest()})
              except Exception as e:item['error']=repr(e)
              report.append(item)
          Path('docs/diagnostics').mkdir(parents=True,exist_ok=True)
          Path('docs/diagnostics/runtime-host-comparison-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-compare-runtime-hosts.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record runtime host comparison'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
