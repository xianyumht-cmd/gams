name: One-shot noname AST behavior analysis

on:
  pull_request:
    branches: [v2-server-authoritative]
    types: [synchronize]
    paths:
      - tools/js_maintenance/analyze_noname_ast.mjs
      - .github/workflows/one-shot-noname-ast-analysis.yml

permissions:
  contents: write

jobs:
  analyze:
    if: github.head_ref == 'analysis/js-maintenance-knowledgebase'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis/js-maintenance-knowledgebase
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Install parser
        shell: bash
        run: npm install --no-save acorn@8.15.0 acorn-walk@8.3.4

      - name: Generate noname function graph
        shell: bash
        run: |
          set -euo pipefail
          node tools/js_maintenance/analyze_noname_ast.mjs \
            remote-script/src/noname.js \
            docs/js-maintenance/noname-ast \
            | tee /tmp/noname-ast-summary.json
          test -s docs/js-maintenance/noname-ast/noname-function-graph.json
          test -s docs/js-maintenance/noname-ast/README.md
          node -e "JSON.parse(require('fs').readFileSync('docs/js-maintenance/noname-ast/noname-function-graph.json','utf8'))"

      - name: Commit analysis reports
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/js-maintenance/noname-ast
          if git diff --cached --quiet; then
            echo 'No AST analysis changes.'
            exit 0
          fi
          git commit -m 'Generate noname function behavior graph'
          git push origin HEAD:analysis/js-maintenance-knowledgebase

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noname-ast-analysis-summary
          path: /tmp/noname-ast-summary.json
          retention-days: 7
          if-no-files-found: warn
