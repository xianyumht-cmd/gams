name: One-shot V2 repository inventory

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  inventory:
    if: github.head_ref == 'v2-server-authoritative'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: v2-server-authoritative
    steps:
      - name: Checkout V2 branch with write authentication
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" FETCH_HEAD
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate repository and Android inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v2/audit
          {
            echo '# FILE TREE'
            find . -path './.git' -prune -o -type f -printf '%p\n' | sort
            echo
            echo '# DIRECTORIES'
            find . -path './.git' -prune -o -type d -maxdepth 5 -printf '%p\n' | sort
            echo
            echo '# PACKAGE / APPLICATION IDS'
            grep -RInE --exclude-dir=.git --exclude='*.js' --exclude='*.map' --exclude='game-*.js' '(applicationId|namespace|package[[:space:]]+[A-Za-z0-9_.]+|android:name=|rootProject.name|include\()' . || true
            echo
            echo '# BUILD TASKS AND WORKFLOWS'
            grep -RInE --exclude-dir=.git '(assemble|bundle|apk|upload-artifact|gradlew|wrangler|applicationId)' .github android* app* manager* key* 2>/dev/null || true
            echo
            echo '# REMOTE SCRIPT REFERENCES'
            grep -RInE --exclude-dir=.git --exclude='game-*.js' --exclude='noname-*.js' '(noname\.js|engine/stable|game-[0-9]|space-z\.ai|SCRIPT_|MANIFEST|WebView|JavascriptInterface|addWebMessageListener)' . 2>/dev/null || true
          } > v2/audit/inventory.txt

          : > v2/audit/key-files.txt
          while IFS= read -r file; do
            case "$file" in
              */build.gradle|*/build.gradle.kts|*/settings.gradle|*/settings.gradle.kts|*/gradle.properties|*/AndroidManifest.xml|*/wrangler.jsonc|*/package.json|*/README.md|.github/workflows/*.yml|.github/workflows/*.yaml)
                size=$(stat -c %s "$file")
                if [ "$size" -le 120000 ]; then
                  printf '\n\n===== %s =====\n' "$file" >> v2/audit/key-files.txt
                  cat "$file" >> v2/audit/key-files.txt
                fi
                ;;
            esac
          done < <(find . -path './.git' -prune -o -type f -print | sort)

          python3 - <<'PY'
          from pathlib import Path
          import hashlib, json
          files=[]
          for p in sorted(Path('.').rglob('*')):
              if not p.is_file() or '.git' in p.parts or p.parts[:2] == ('v2','audit'):
                  continue
              st=p.stat()
              rec={'path':p.as_posix(),'size':st.st_size}
              if st.st_size <= 2_000_000:
                  rec['sha256']=hashlib.sha256(p.read_bytes()).hexdigest()
              files.append(rec)
          Path('v2/audit/files.json').write_text(json.dumps(files,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY

      - name: Commit inventory to V2 branch
        shell: bash
        run: |
          set -euo pipefail
          git add v2/audit
          git commit -m "Inventory existing Android, manager, backend, and build structure"
          git push origin HEAD:"${TARGET_BRANCH}"
