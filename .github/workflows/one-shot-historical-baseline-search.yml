name: One-shot historical official baseline search

on:
  pull_request:
    branches: [v2-server-authoritative]
    types: [synchronize]
    paths:
      - tools/js_maintenance/find_historical_official_baselines_fast.py
      - .github/workflows/one-shot-historical-baseline-search.yml

permissions:
  contents: write

jobs:
  search:
    if: github.head_ref == 'analysis/js-maintenance-knowledgebase'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis/js-maintenance-knowledgebase
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Query bounded public historical archives
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/js_maintenance/find_historical_official_baselines_fast.py \
            --repo-root . \
            --output-dir docs/js-maintenance/historical-search \
            | tee /tmp/historical-baseline-summary.json
          python3 -m py_compile tools/js_maintenance/find_historical_official_baselines_fast.py
          test -s docs/js-maintenance/historical-search/historical-search.json
          test -s docs/js-maintenance/historical-search/README.md

      - name: Commit archive metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/js-maintenance/historical-search
          if git diff --cached --quiet; then
            echo 'No historical metadata changes.'
            exit 0
          fi
          git commit -m 'Record bounded historical official baseline search'
          git push origin HEAD:analysis/js-maintenance-knowledgebase

      - name: Upload search summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-official-baseline-search
          path: /tmp/historical-baseline-summary.json
          retention-days: 7
          if-no-files-found: warn
