name: Diagnose engine loading alert chain

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-engine-alert.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      LICENSE_ADMIN_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decrypt and verify the currently published V2 runtime
        shell: bash
        run: |
          set -euo pipefail
          test -n "${LICENSE_ADMIN_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD missing"; exit 1; }
          python -m pip install --quiet cryptography
          python3 - <<'PY'
          import base64
          import hashlib
          import io
          import json
          import os
          import zipfile
          from pathlib import Path
          from cryptography.hazmat.primitives.ciphers.aead import AESGCM

          root = Path('.')
          manifest = json.loads((root / 'v2/runtime/release/manifest.json').read_text(encoding='utf-8'))
          bundle = (root / 'v2/runtime/release' / manifest['file']).read_bytes()
          assert len(bundle) == manifest['size']
          assert hashlib.sha256(bundle).hexdigest() == manifest['sha256']

          password = os.environ['LICENSE_ADMIN_PASSWORD']
          master = hashlib.sha256(f"gg-v2-runtime-master:{password}".encode()).digest()
          content_key = AESGCM(master).decrypt(
              base64.b64decode(manifest['keyIv']),
              base64.b64decode(manifest['keyCipher']),
              f"gg-v2-key|{manifest['versionName']}".encode(),
          )
          plain = AESGCM(content_key).decrypt(
              base64.b64decode(manifest['iv']),
              bundle,
              f"gg-v2-runtime|{manifest['versionName']}".encode(),
          )
          out = Path('/tmp/current-runtime')
          out.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(io.BytesIO(plain)) as archive:
              archive.extractall(out)
          noname = (out / 'noname.js').read_bytes()
          game = (out / 'game.js').read_bytes()
          assert len(noname) == manifest['nonameSize']
          assert hashlib.sha256(noname).hexdigest() == manifest['nonameSha256']
          assert len(game) == manifest['gameSize']
          assert hashlib.sha256(game).hexdigest() == manifest['gameSha256']
          facts = {
              'runtimeVersion': manifest['versionName'],
              'runtimeSha256': manifest['sha256'],
              'nonameSha256': hashlib.sha256(noname).hexdigest(),
              'gameSha256': hashlib.sha256(game).hexdigest(),
              'gameSize': len(game),
              'runtimeGameContainsVisibleAlert': '脚本加载完成~'.encode() in game,
              'runtimeNonameContainsVisibleAlert': '脚本加载完成~'.encode() in noname,
              'runtimeGameContainsHiddenProbe': b'__gg_runtime_probe__' in game,
          }
          Path('/tmp/runtime-facts.json').write_text(json.dumps(facts, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(facts, ensure_ascii=False, indent=2))
          PY

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Reproduce the APK loading chain and identify alert sources
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/diagnose-alert.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const TARGET = 'https://m.66rpg.com/h5/1690283?ohp=v3&quality=32';
          const VIRTUAL = 'https://ggv2.local/runtime/game.js';
          const runtimeGame = fs.readFileSync('/tmp/current-runtime/game.js');
          const runtimeNoname = fs.readFileSync('/tmp/current-runtime/noname.js', 'utf8');
          const visibleAlert = '脚本加载完成~';

          const isApkEngineRequest = (url) => {
            const lower = String(url || '').toLowerCase();
            return lower === VIRTUAL.toLowerCase()
              || lower.includes('gams-script-edge.2320006072.workers.dev/engine/stable.js')
              || lower.includes('space-z.ai/game.js');
          };

          const alertProbe = `(() => {
            const original = window.alert;
            Object.defineProperty(window, '__GG_ALERT_EVENTS__', { value: [], configurable: true });
            window.alert = function(message) {
              let currentScript = '';
              try { currentScript = document.currentScript && document.currentScript.src || ''; } catch (_) {}
              window.__GG_ALERT_EVENTS__.push({
                message: String(message),
                currentScript,
                url: location.href,
                stack: String(new Error('alert trace').stack || ''),
                at: Date.now()
              });
              return original.apply(this, arguments);
            };
          })();`;
          const wrappedNoname = `(function(){if(window.__GG_V2_CONTROL_LOADED__)return;window.__GG_V2_CONTROL_LOADED__=true;try{\n${runtimeNoname}\n}catch(e){window.__GG_V2_CONTROL_LOADED__=false;console.error('[GG]',e);}})();`;

          const browser = await chromium.launch({
            headless: true,
            args: ['--no-sandbox', '--disable-dev-shm-usage'],
          });
          const context = await browser.newContext({
            locale: 'zh-CN',
            timezoneId: 'Asia/Shanghai',
            viewport: { width: 412, height: 915 },
            isMobile: true,
            hasTouch: true,
            ignoreHTTPSErrors: true,
            userAgent: 'Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 Chrome/125.0.0.0 Mobile Safari/537.36',
          });

          await context.addInitScript({ content: alertProbe + '\n' + wrappedNoname });

          const requests = [];
          const matchedByApk = [];
          const scriptBodiesContainingAlert = [];
          const dialogs = [];
          const pageErrors = [];
          const scanTasks = [];

          await context.route('**/*', async (route) => {
            const url = route.request().url();
            if (isApkEngineRequest(url)) {
              matchedByApk.push(url);
              await route.fulfill({
                status: 200,
                contentType: 'application/javascript; charset=utf-8',
                headers: {
                  'Cache-Control': 'no-store, no-cache, max-age=0',
                  'Pragma': 'no-cache',
                  'X-Content-Type-Options': 'nosniff',
                  'Access-Control-Allow-Origin': '*',
                },
                body: runtimeGame,
              });
              return;
            }
            await route.continue();
          });

          const attach = (page) => {
            page.on('request', (request) => requests.push({ url: request.url(), type: request.resourceType() }));
            page.on('pageerror', (error) => pageErrors.push(String(error.stack || error.message)));
            page.on('dialog', async (dialog) => {
              dialogs.push({ type: dialog.type(), message: dialog.message(), pageUrl: page.url() });
              await dialog.dismiss().catch(() => {});
            });
            page.on('response', (response) => {
              const request = response.request();
              if (request.resourceType() !== 'script') return;
              const task = (async () => {
                try {
                  const body = await response.body();
                  if (body.includes(Buffer.from(visibleAlert))) {
                    scriptBodiesContainingAlert.push({
                      url: response.url(),
                      status: response.status(),
                      size: body.length,
                      matchedByApk: isApkEngineRequest(response.url()),
                    });
                  }
                } catch (_) {}
              })();
              scanTasks.push(task);
            });
          };

          context.on('page', attach);
          const page = await context.newPage();
          attach(page);

          let navigationError = '';
          try {
            await page.goto(TARGET, { waitUntil: 'domcontentloaded', timeout: 90_000 });
            await page.waitForTimeout(12_000);
            for (const label of ['无需下载', '在线看', '开始游戏', '在线玩']) {
              try {
                const button = page.getByText(label, { exact: false }).first();
                if (await button.isVisible({ timeout: 1_500 })) {
                  await button.click({ timeout: 5_000 });
                  await page.waitForTimeout(6_000);
                }
              } catch (_) {}
            }
            await page.waitForTimeout(25_000);
          } catch (error) {
            navigationError = String(error.stack || error.message);
          }

          await Promise.allSettled(scanTasks);
          const frameAlertEvents = [];
          for (const p of context.pages()) {
            for (const frame of p.frames()) {
              try {
                const events = await frame.evaluate(() => Array.isArray(window.__GG_ALERT_EVENTS__) ? window.__GG_ALERT_EVENTS__ : []);
                for (const event of events) frameAlertEvents.push({ ...event, frameUrl: frame.url() });
              } catch (_) {}
            }
          }

          const engineRequests = requests.filter((item) => /game\.js|engine\/stable/i.test(item.url));
          const unmatchedEngineRequests = engineRequests.filter((item) => !isApkEngineRequest(item.url));
          const report = {
            target: TARGET,
            finalUrl: page.url(),
            navigationError,
            dialogs,
            alertEvents: frameAlertEvents,
            scriptBodiesContainingAlert,
            engineRequests,
            matchedByApk,
            unmatchedEngineRequests,
            pageErrors: pageErrors.slice(0, 40),
          };
          fs.writeFileSync('/tmp/browser-chain.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          await browser.close();
          NODE
          node /tmp/diagnose-alert.mjs

      - name: Produce diagnosis report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/diagnostics
          python3 - <<'PY'
          import json
          from pathlib import Path

          runtime = json.loads(Path('/tmp/runtime-facts.json').read_text(encoding='utf-8'))
          browser = json.loads(Path('/tmp/browser-chain.json').read_text(encoding='utf-8'))
          combined = {'runtime': runtime, 'browser': browser}
          Path('docs/diagnostics/engine-alert-chain-20260723.json').write_text(
              json.dumps(combined, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          containing = browser.get('scriptBodiesContainingAlert', [])
          alerts = [x for x in browser.get('alertEvents', []) if x.get('message') == '脚本加载完成~']
          unmatched = browser.get('unmatchedEngineRequests', [])
          lines = [
              '# Engine alert chain diagnosis', '',
              f"- Published runtime: `{runtime['runtimeVersion']}`",
              f"- Runtime game SHA-256: `{runtime['gameSha256']}`",
              f"- Visible alert inside runtime game: `{runtime['runtimeGameContainsVisibleAlert']}`",
              f"- Hidden probe inside runtime game: `{runtime['runtimeGameContainsHiddenProbe']}`",
              f"- Captured exact alert events: `{len(alerts)}`",
              f"- Script responses containing exact alert text: `{len(containing)}`",
              f"- Engine requests not matched by APK interception: `{len(unmatched)}`",
              '', '## Script responses containing the exact text', ''
          ]
          if containing:
              for item in containing:
                  lines.append(f"- `{item['url']}` (size {item['size']}, matchedByApk={item['matchedByApk']})")
          else:
              lines.append('- None captured in this run.')
          lines += ['', '## Exact alert call stacks', '']
          if alerts:
              for item in alerts:
                  lines += [f"- currentScript: `{item.get('currentScript','')}`", '```text', item.get('stack',''), '```']
          else:
              lines.append('- No exact alert fired during this headless reproduction.')
          lines += ['', '## Unmatched engine requests', '']
          if unmatched:
              for item in unmatched:
                  lines.append(f"- `{item['url']}`")
          else:
              lines.append('- None.')
          Path('docs/diagnostics/engine-alert-chain-20260723.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit report and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-diagnose-engine-alert.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record full engine alert loading-chain diagnosis"
          git push origin HEAD:main
