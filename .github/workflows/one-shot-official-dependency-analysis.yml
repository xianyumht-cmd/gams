name: One-shot official dependency analysis

on:
  pull_request:
    branches: [v2-server-authoritative]
    types: [synchronize]
    paths:
      - tools/js_maintenance/capture_official_dependencies.py
      - tools/js_maintenance/resolve_dynamic_chunks.py
      - game-engine/upstream-baseline.json
      - .github/workflows/one-shot-official-dependency-analysis.yml

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'analysis/js-maintenance-knowledgebase'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis/js-maintenance-knowledgebase
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Capture official page dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/js_maintenance/capture_official_dependencies.py \
            --repo-root . \
            --output-dir docs/js-maintenance/official-current \
            | tee /tmp/official-dependency-summary.json
          python3 tools/js_maintenance/resolve_dynamic_chunks.py \
            --repo-root . \
            --output-dir docs/js-maintenance/official-current \
            | tee /tmp/dynamic-chunk-summary.json
          python3 -m py_compile \
            tools/js_maintenance/capture_official_dependencies.py \
            tools/js_maintenance/resolve_dynamic_chunks.py
          test -s docs/js-maintenance/official-current/snapshot.json
          test -s docs/js-maintenance/official-current/resource-inventory.json
          test -s docs/js-maintenance/official-current/dependency-module-map.json
          test -s docs/js-maintenance/official-current/dynamic-chunks.json
          test -s docs/js-maintenance/official-current/inline-page-anchors.json
          test -s docs/js-maintenance/official-current/dynamic-chunks.md
          test -s docs/js-maintenance/official-current/README.md

      - name: Commit metadata reports
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/js-maintenance/official-current
          if git diff --cached --quiet; then
            echo 'No official dependency changes.'
            exit 0
          fi
          git commit -m 'Resolve current official dynamic chunks'
          git push origin HEAD:analysis/js-maintenance-knowledgebase

      - name: Upload capture summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-dependency-analysis-summary
          path: |
            /tmp/official-dependency-summary.json
            /tmp/dynamic-chunk-summary.json
          retention-days: 7
          if-no-files-found: warn
