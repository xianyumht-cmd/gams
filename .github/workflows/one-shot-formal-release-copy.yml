name: One-shot formal release copy cleanup

on:
  pull_request:
    branches:
      - v2-server-authoritative
    types: [synchronize]
    paths:
      - .github/workflows/one-shot-formal-release-copy.yml
      - tools/apply_formal_release_copy.py
      - v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java
      - v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java

permissions:
  contents: write

jobs:
  update-copy:
    if: github.head_ref == 'release/gg-2.0.0-v9'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/gg-2.0.0-v9
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply formal release copy
        run: python3 tools/apply_formal_release_copy.py

      - name: Commit formal release copy
        shell: bash
        run: |
          set -euo pipefail
          git add v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java \
                  v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java
          if git diff --cached --quiet; then
            echo 'Formal copy already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Use formal user-facing release copy'
          git push origin HEAD:release/gg-2.0.0-v9
