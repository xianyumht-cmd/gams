name: One-shot formal release copy cleanup

on:
  pull_request:
    branches:
      - v2-server-authoritative
    types: [synchronize]
    paths:
      - .github/workflows/one-shot-formal-release-copy.yml
      - v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java
      - v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java

permissions:
  contents: write

jobs:
  update-copy:
    if: github.head_ref == 'release/gg-2.0.0-v9'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/gg-2.0.0-v9
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Replace developer-facing copy with formal user copy
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          main = Path('v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java')
          text = main.read_text(encoding='utf-8')
          replacements = {
              'showLoading("正在建立安全运行环境…");': 'showLoading("正在启动…");',
              'title.setText("GG V2");': 'title.setText("GG");',
              'subtitle.setText("核心运行数据仅在内存中解密，不保存到APK、WebView缓存或本地脚本文件。");': 'subtitle.setText("请输入激活码后启动");',
              'status.setText("正在鉴权并解密运行包…");': 'status.setText("正在验证，请稍候…");',
              'console.error(\'[GG V2]\',e);': 'console.error(\'[GG]\',e);',
              '.setMessage("清除网页缓存、Cookie和本地网页设置，不影响V2激活状态。")': '.setMessage("清除网页缓存、Cookie和本地网页设置，不会影响账号授权。")',
              '.setTitle("V2服务信息")': '.setTitle("服务信息")',
              '.setMessage("当前V2设备会立即退出，是否继续？")': '.setMessage("当前设备会立即退出账号，是否继续？")',
              'showLoading("正在解除V2设备绑定…");': 'showLoading("正在解除设备绑定…");',
              '.setTitle(required ? "需要更新V2" : "发现V2更新")': '.setTitle(required ? "需要更新" : "发现更新")',
              '? "发现新的V2客户端" : message)': '? "发现新版本" : message)',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing MainActivity replacement anchor: {old}')
              text = text.replace(old, new)
          main.write_text(text, encoding='utf-8')

          manager = Path('v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java')
          text = manager.read_text(encoding='utf-8')
          replacements = {
              'RuntimeResult.valid(payload, auth, "V2安全运行环境已就绪")': 'RuntimeResult.valid(payload, auth, "启动成功")',
              'RuntimeResult.invalid("需要联网启动V2，请检查网络后重试")': 'RuntimeResult.invalid("需要联网启动，请检查网络后重试")',
              'RuntimeResult.invalid("V2初始化失败：" + safeMessage(error))': 'RuntimeResult.invalid("启动失败，请重试")',
              'RuntimeResult.valid(payload, auth, "V2启动成功")': 'RuntimeResult.valid(payload, auth, "启动成功")',
              'RuntimeResult.invalid("V2启动失败：" + safeMessage(error))': 'RuntimeResult.invalid("启动失败，请重试")',
              'SimpleResult.failure("更换设备失败：" + safeMessage(error))': 'SimpleResult.failure("更换设备失败，请重试")',
              'return "正式通道\\n有效期：" + validity +\n                "\\n运行核心：仅内存加载\\n离线启动：已禁用\\n客户端：2.0.0";': 'return "有效期：" + validity + "\\n版本：2.0.0";',
              'return "V2运行服务维护中";': 'return "服务维护中";',
              'return "V2客户端需要更新";': 'return "客户端需要更新";',
              'required ? "需要更新V2客户端" : message,': 'required ? "需要更新客户端" : message,',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing V2LicenseManager replacement anchor: {old}')
              text = text.replace(old, new)

          internal_codes = '''        if ("server_error".equals(error.code)
                  || "runtime_unavailable".equals(error.code)
                  || "runtime_invalid".equals(error.code)
                  || "bad_runtime_key".equals(error.code)
                  || "runtime_key_mismatch".equals(error.code)) {
              return "服务暂时不可用，请稍后重试";
          }
'''
          anchor = '        if ("too_many_requests".equals(error.code)) return "操作过于频繁，请稍后再试";\n'
          if anchor not in text:
              raise SystemExit('Missing userMessage insertion anchor')
          text = text.replace(anchor, anchor + internal_codes)
          manager.write_text(text, encoding='utf-8')
          PY

          grep -R -n -E 'GG V2|V2测试|V2服务信息|内存中解密|WebView缓存|运行核心|加密运行包|正在鉴权|需要更新V2|发现V2更新' \
            v2/android/client/src/main/java && {
              echo 'Developer-facing release copy remains.'
              exit 1
            } || true

          git add v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java \
                  v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Use formal user-facing release copy'
          git push origin HEAD:release/gg-2.0.0-v9
