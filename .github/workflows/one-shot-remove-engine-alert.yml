name: Remove engine alert and publish runtime

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-remove-engine-alert.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LICENSE_ADMIN_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare signed engine and runtime releases
        shell: bash
        run: |
          set -euo pipefail
          test -n "${LICENSE_ADMIN_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD is missing"; exit 1; }
          python -m pip install --quiet cryptography

          python3 - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          source = Path("game-engine/release/game-1.0.2.js")
          target = Path("game-engine/release/game-1.0.3.js")
          data = source.read_bytes()
          old_header = b"/*1.0.2*/"
          old_tail = 'alert("脚本加载完成~");'.encode("utf-8")
          marker = (
              'try{Object.defineProperty(window,"__gg_runtime_probe__",'
              '{value:Object.freeze({engine:"1.0.3",ready:true,loadedAt:Date.now()}),'
              'enumerable:false,configurable:false,writable:false});}catch(_){}'
          ).encode("utf-8")

          if not data.startswith(old_header):
              raise SystemExit("unexpected game.js version header")
          if data.count(old_tail) != 1 or not data.endswith(old_tail):
              raise SystemExit("the loading alert is not the unique file tail")
          if b"__gg_runtime_probe__" in data:
              raise SystemExit("hidden runtime marker already exists")

          updated = b"/*1.0.3*/" + data[len(old_header):-len(old_tail)] + marker
          if old_tail in updated or '脚本加载完成'.encode("utf-8") in updated:
              raise SystemExit("visible loading alert remains")
          if updated.count(b"__gg_runtime_probe__") != 1:
              raise SystemExit("hidden marker count is invalid")
          target.write_bytes(updated)

          digest = hashlib.sha256(updated).hexdigest()
          size = len(updated)
          published = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          manifest = {
              "schemaVersion": 1,
              "channel": "stable",
              "version": 10003,
              "versionName": "1.0.3",
              "file": target.name,
              "sha256": digest,
              "size": size,
              "sourceUrl": "https://raw.githubusercontent.com/xianyumht-cmd/gams/main/game-engine/release/game-1.0.3.js",
              "minNonameVersion": "1.1.1",
              "publishedAt": published,
          }
          keys = (
              "schemaVersion", "channel", "version", "versionName", "file",
              "sha256", "size", "sourceUrl", "minNonameVersion", "publishedAt",
          )
          Path("/tmp/engine-canonical.txt").write_text(
              "".join(f"{key}={manifest[key]}\n" for key in keys),
              encoding="utf-8", newline="\n"
          )
          Path("/tmp/engine-unsigned.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )

          compatibility_path = Path("game-engine/compatibility.json")
          compatibility = json.loads(compatibility_path.read_text(encoding="utf-8"))
          compatibility["stable"]["engineVersion"] = "1.0.3"
          compatibility["stable"]["nonameVersion"] = "1.1.1"
          compatibility_path.write_text(
              json.dumps(compatibility, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          print(json.dumps({"engineVersion":"1.0.3","sha256":digest,"size":size}))
          PY

          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in remote-script/keys/private.pem.enc \
            -out /tmp/release-private.pem \
            -pass env:LICENSE_ADMIN_PASSWORD
          chmod 600 /tmp/release-private.pem

          openssl dgst -sha256 -sign /tmp/release-private.pem \
            -out /tmp/engine.sig /tmp/engine-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/engine.sig /tmp/engine-canonical.txt

          python3 - <<'PY'
          import base64
          import json
          from pathlib import Path
          manifest = json.loads(Path("/tmp/engine-unsigned.json").read_text(encoding="utf-8"))
          manifest["signatureAlgorithm"] = "SHA256withECDSA"
          manifest["signature"] = base64.b64encode(Path("/tmp/engine.sig").read_bytes()).decode("ascii")
          Path("game-engine/release/manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          PY

          python3 v2/runtime/tools/build_release.py \
            remote-script/src/noname.js \
            game-engine/release/game-1.0.3.js \
            2.0.0-r1 \
            "$LICENSE_ADMIN_PASSWORD" \
            v2/runtime/release

          openssl dgst -sha256 -sign /tmp/release-private.pem \
            -out /tmp/runtime.sig /tmp/v2-runtime-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/runtime.sig /tmp/v2-runtime-canonical.txt

          python3 - <<'PY'
          import base64
          import json
          from pathlib import Path
          manifest = json.loads(Path("/tmp/v2-runtime-unsigned.json").read_text(encoding="utf-8"))
          manifest["signatureAlgorithm"] = "SHA256withECDSA"
          manifest["signature"] = base64.b64encode(Path("/tmp/runtime.sig").read_bytes()).decode("ascii")
          Path("v2/runtime/release/manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          PY

          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          engine = Path("game-engine/release/game-1.0.3.js").read_bytes()
          em = json.loads(Path("game-engine/release/manifest.json").read_text(encoding="utf-8"))
          rm = json.loads(Path("v2/runtime/release/manifest.json").read_text(encoding="utf-8"))
          bundle = Path("v2/runtime/release") / rm["file"]
          assert '脚本加载完成'.encode("utf-8") not in engine
          assert engine.count(b"__gg_runtime_probe__") == 1
          assert em["versionName"] == "1.0.3"
          assert em["sha256"] == hashlib.sha256(engine).hexdigest()
          assert em["size"] == len(engine)
          assert rm["versionName"] == "2.0.0-r1"
          assert rm["gameSha256"] == hashlib.sha256(engine).hexdigest()
          assert rm["gameSize"] == len(engine)
          assert bundle.is_file() and bundle.stat().st_size == rm["size"]
          assert hashlib.sha256(bundle.read_bytes()).hexdigest() == rm["sha256"]
          print(json.dumps({
              "engine": em["versionName"],
              "runtime": rm["versionName"],
              "engineSha256": em["sha256"],
              "runtimeSha256": rm["sha256"],
              "marker": "__gg_runtime_probe__"
          }, ensure_ascii=False))
          PY

          rm -f /tmp/release-private.pem /tmp/engine.sig /tmp/runtime.sig \
            /tmp/engine-canonical.txt /tmp/engine-unsigned.json \
            /tmp/v2-runtime-canonical.txt /tmp/v2-runtime-unsigned.json

      - name: Commit formal runtime update
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-remove-engine-alert.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove engine loading alert and publish runtime 2.0.0-r1"
          git push origin HEAD:main
