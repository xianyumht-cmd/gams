name: Verify old preview engine response
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-check-old-preview-engine.yml]
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Fetch and compare old preview engine
        shell: bash
        run: |
          set -euo pipefail
          url='https://preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js'
          status="$(curl -L -sS --retry 3 --connect-timeout 15 --max-time 120 -A 'Mozilla/5.0 (Linux; Android 13)' -o /tmp/old-preview.js -w '%{http_code}' "$url" || true)"
          python3 - "$status" <<'PY'
          import hashlib,json,sys
          from pathlib import Path
          status=sys.argv[1]
          path=Path('/tmp/old-preview.js')
          body=path.read_bytes() if path.exists() else b''
          refs=[]
          for name in ['game-engine/release/game-1.0.2.js','game-engine/release/game-1.0.3.js']:
              data=Path(name).read_bytes()
              refs.append({'path':name,'size':len(data),'sha256':hashlib.sha256(data).hexdigest(),'sameAsResponse':data==body})
          report={
              'url':'https://preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js',
              'httpStatus':status,
              'size':len(body),
              'sha256':hashlib.sha256(body).hexdigest() if body else '',
              'containsExactAlert':'脚本加载完成~'.encode() in body,
              'tail':body[-400:].decode('utf-8',errors='replace'),
              'references':refs,
          }
          Path('docs/diagnostics').mkdir(parents=True,exist_ok=True)
          Path('docs/diagnostics/old-preview-engine-response-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-check-old-preview-engine.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record old preview engine response verification'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
