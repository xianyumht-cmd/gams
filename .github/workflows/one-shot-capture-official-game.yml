name: One-shot extract targeted game script contexts
# trigger: contexts-2026-07-22

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-shot-capture-official-game.yml

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract normalized contexts
        shell: bash
        run: |
          set -euo pipefail
          OUT=/tmp/game-targeted-contexts
          mkdir -p "$OUT"
          curl --fail --location --compressed --retry 3 --max-time 180 'https://c2.cgyouxi.com/website/hfplayer/v3/bin/official/game.js?v=202607090001' -o "$OUT/official.js"
          curl --fail --location --compressed --retry 3 --max-time 180 'https://preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js' -o "$OUT/external.js"
          cat > /tmp/contexts.py <<'PY'
          from pathlib import Path
          import ast, json, re
          out=Path('/tmp/game-targeted-contexts')
          concat_re=re.compile(r"(?P<a>'(?:\\.|[^'\\])*'|\"(?:\\.|[^\"\\])*\")\s*\+\s*(?P<b>'(?:\\.|[^'\\])*'|\"(?:\\.|[^\"\\])*\")")
          def normalize(src):
              src=re.sub(r'^/\*[^*]{0,100}\*/','',src,count=1)
              for _ in range(30):
                  count=0
                  def repl(m):
                      nonlocal count
                      try:
                          a=ast.literal_eval(m.group('a')); b=ast.literal_eval(m.group('b'))
                          if isinstance(a,str) and isinstance(b,str):
                              count+=1; return json.dumps(a+b,ensure_ascii=False)
                      except Exception: pass
                      return m.group(0)
                  src=concat_re.sub(repl,src)
                  if count==0: break
              return src
          sources={
              'official':normalize((out/'official.js').read_text('utf-8',errors='replace')),
              'external':normalize((out/'external.js').read_text('utf-8',errors='replace')),
          }
          terms=['脚本加载完成~','flowerCount','totalFlower','freshFlower','wildFlower','haveFlower','userFlower','createBuyOrder','get_goods_list','getUserHaveAllPropNum','PropShop','itemPrice','mallViewData','isLogin','userData','currentUserData','showLocal','goods_id','buy_num','order_id','disable-devtool','crack_user','gameOpenTime','saveFileData','getSaveFileData','SAL_getUserData','SAL_Login']
          def contexts(src,term,limit=8,radius=420):
              rows=[]; lower=src.lower(); needle=term.lower(); pos=0
              while len(rows)<limit:
                  i=lower.find(needle,pos)
                  if i<0: break
                  start=max(0,i-radius); end=min(len(src),i+len(term)+radius)
                  rows.append(re.sub(r'\s+',' ',src[start:end]))
                  pos=i+len(term)
              return rows
          report={}
          lines=[]
          for term in terms:
              report[term]={}
              lines.append(f'===== {term} =====')
              for name,src in sources.items():
                  rows=contexts(src,term)
                  report[term][name]=rows
                  lines.append(f'--- {name} matches={src.lower().count(term.lower())} contexts={len(rows)} ---')
                  for i,row in enumerate(rows,1): lines.append(f'[{i}] {row}')
              lines.append('')
          (out/'targeted-contexts.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),'utf-8')
          (out/'targeted-contexts.txt').write_text('\n'.join(lines)+'\n','utf-8')
          PY
          python /tmp/contexts.py
          rm "$OUT/official.js" "$OUT/external.js"

      - name: Save report to analysis branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin analysis/official-game-capture-20260722
          git worktree add /tmp/analysis origin/analysis/official-game-capture-20260722
          rm -rf /tmp/analysis/analysis-snapshots/game-targeted-contexts
          mkdir -p /tmp/analysis/analysis-snapshots
          cp -a /tmp/game-targeted-contexts /tmp/analysis/analysis-snapshots/game-targeted-contexts
          cd /tmp/analysis
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add analysis-snapshots/game-targeted-contexts
          git commit -m 'Extract targeted game script contexts'
          git push origin HEAD:analysis/official-game-capture-20260722
