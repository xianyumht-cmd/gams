name: One-shot capture official game page
# trigger: lightweight-2026-07-22

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-shot-capture-official-game.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch official H5 page
        shell: bash
        run: |
          set -euo pipefail
          OUT=/tmp/official-page-raw
          mkdir -p "$OUT"
          URL='https://m.66rpg.com/h5/1690283?ohp=v3&quality=32'
          UA='Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Mobile Safari/537.36'
          curl --fail --location --compressed --retry 3 --connect-timeout 20 --max-time 120 \
            -A "$UA" -D "$OUT/headers.txt" "$URL" -o "$OUT/page.html"
          wc -c "$OUT/page.html" > "$OUT/size.txt"
          sha256sum "$OUT/page.html" > "$OUT/sha256.txt"
          python - <<'PY'
          from pathlib import Path
          import html, json, re
          p = Path('/tmp/official-page-raw/page.html')
          text = p.read_text('utf-8', errors='replace')
          patterns = {
              'script_src': r'<script[^>]+src=["\']([^"\']+)',
              'all_js_urls': r'(?:https?:)?//[^"\'\s<>]+?\.js(?:\?[^"\'\s<>]*)?',
              'relative_js': r'["\']([^"\']+\.js(?:\?[^"\']*)?)["\']',
              'webpack_chunks': r'webpackChunk[A-Za-z0-9_$]*',
          }
          result = {}
          for key, pattern in patterns.items():
              values = []
              for m in re.finditer(pattern, text, re.I):
                  value = m.group(1) if m.lastindex else m.group(0)
                  value = html.unescape(value)
                  if value not in values:
                      values.append(value)
              result[key] = values
          result['title'] = re.findall(r'<title[^>]*>(.*?)</title>', text, re.I | re.S)[:3]
          result['prefix'] = text[:2000]
          Path('/tmp/official-page-raw/extracted.json').write_text(json.dumps(result, ensure_ascii=False, indent=2), 'utf-8')
          lines = []
          for key, values in result.items():
              if isinstance(values, list):
                  lines.append(f'[{key}] {len(values)}')
                  lines.extend(str(v) for v in values)
                  lines.append('')
          Path('/tmp/official-page-raw/summary.txt').write_text('\n'.join(lines), 'utf-8')
          PY
          cat "$OUT/summary.txt"

      - name: Save raw capture to analysis branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin analysis/official-game-capture-20260722
          git worktree add /tmp/analysis origin/analysis/official-game-capture-20260722
          rm -rf /tmp/analysis/analysis-snapshots/official-page-raw
          mkdir -p /tmp/analysis/analysis-snapshots
          cp -a /tmp/official-page-raw /tmp/analysis/analysis-snapshots/official-page-raw
          cd /tmp/analysis
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add analysis-snapshots/official-page-raw
          git commit -m 'Capture official H5 page source for analysis'
          git push origin HEAD:analysis/official-game-capture-20260722
