name: One-shot V2 hardened backend capture

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  capture:
    if: github.head_ref == 'v2-server-authoritative'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: v2-server-authoritative
    steps:
      - name: Checkout V2 branch with write authentication
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" FETCH_HEAD
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Assemble current hardened backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v2/audit
          cat hardening_backend_parts/part* > v2/audit/current-hardened-backend.js
          node --check v2/audit/current-hardened-backend.js
          sha256sum v2/audit/current-hardened-backend.js > v2/audit/current-hardened-backend.sha256
      - name: Commit capture
        shell: bash
        run: |
          set -euo pipefail
          git add v2/audit/current-hardened-backend.js v2/audit/current-hardened-backend.sha256
          git commit -m 'Capture current hardened license backend for V2 migration'
          git push origin HEAD:"${TARGET_BRANCH}"
