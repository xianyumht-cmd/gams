name: Inspect GG 2.0.1 release status

on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-inspect-gg-2.0.1-run.yml]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 1}
      - name: Fetch target run status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=c430ac87085d009c195d733f9dfba4beafdab3b6&per_page=20"
          curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api" > /tmp/runs.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/runs.json').read_text())
          out=[]
          for run in data.get('workflow_runs',[]):
              out.append({k:run.get(k) for k in ('id','name','head_sha','status','conclusion','event','html_url','created_at','updated_at')})
          Path('diagnostics/gg-2.0.1-release-runs.json').parent.mkdir(parents=True,exist_ok=True)
          Path('diagnostics/gg-2.0.1-release-runs.json').write_text(json.dumps(out,ensure_ascii=False,indent=2)+'\n')
          print(json.dumps(out,ensure_ascii=False,indent=2))
          PY
      - name: Commit report and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-inspect-gg-2.0.1-run.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record GG 2.0.1 release workflow status"
          git push origin HEAD:main
