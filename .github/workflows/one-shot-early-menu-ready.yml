name: One-shot early menu readiness patch

on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-early-menu-ready.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/patch-early-menu-ready.py
      - run: node --check remote-script/src/noname.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add remote-script/src/noname.js
          git commit -m "Apply menu sizing before the first G click on 1.0.9"
          git push
