name: Export alert diagnosis log tail
# successful trace output

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-export-alert-diagnosis-log-tail.yml

permissions:
  actions: read
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export trace job log tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api repos/${GITHUB_REPOSITORY}/actions/jobs/89118453920/logs > /tmp/job.log
          tail -n 280 /tmp/job.log > diagnostics/loading-alert-job-tail.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/loading-alert-job-tail.txt
          git commit -m "Record successful alert runtime trace output"
          git pull --rebase origin main
          git push origin HEAD:main
