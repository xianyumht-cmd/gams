name: Deploy online license API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - license-api/**
      - .github/workflows/deploy-license-api.yml
  pull_request:
    branches:
      - main
    paths:
      - license-api/**
      - .github/workflows/deploy-license-api.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LICENSE_ADMIN_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is missing"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is missing"; exit 1; }
          test -n "${LICENSE_ADMIN_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD is missing"; exit 1; }

      - name: Find or create D1 database
        id: d1
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database"
          list="$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api?per_page=100")"
          database_id="$(printf '%s' "$list" | jq -r '.result[] | select(.name=="gams-license-db") | (.uuid // .id)' | head -n1)"
          if [[ -z "$database_id" || "$database_id" == "null" ]]; then
            created="$(curl -fsS -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"gams-license-db"}' \
              "$api")"
            database_id="$(printf '%s' "$created" | jq -r '.result.uuid // .result.id')"
          fi
          test -n "$database_id" && test "$database_id" != "null"
          echo "database_id=$database_id" >> "$GITHUB_OUTPUT"

      - name: Generate Wrangler configuration
        working-directory: license-api
        shell: bash
        run: |
          set -euo pipefail
          sed "s/__D1_DATABASE_ID__/${{ steps.d1.outputs.database_id }}/g" \
            wrangler.template.jsonc > wrangler.generated.jsonc

      - name: Configure Worker secret
        working-directory: license-api
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$LICENSE_ADMIN_PASSWORD" \
            | npx --yes wrangler@4 secret put ADMIN_PASSWORD --config wrangler.generated.jsonc

      - name: Apply D1 migrations
        working-directory: license-api
        run: npx --yes wrangler@4 d1 migrations apply gams-license-db --remote --config wrangler.generated.jsonc

      - name: Deploy Worker and custom domain
        working-directory: license-api
        shell: bash
        run: |
          set +e
          npx --yes wrangler@4 deploy --config wrangler.generated.jsonc > /tmp/wrangler-deploy.log 2>&1
          code=$?
          tail -n 160 /tmp/wrangler-deploy.log
          exit $code

      - name: Upload Wrangler deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-api-deploy-log
          path: /tmp/wrangler-deploy.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Wait for custom domain and certificate
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://license.xn--8pv109c.top"
          for attempt in $(seq 1 36); do
            status="$(curl --silent --show-error \
              --output /tmp/license-health.json \
              --write-out '%{http_code}' \
              "$endpoint/health" || true)"
            if [[ "$status" == "200" ]] \
              && jq -e '.ok == true and .service == "gams-license-api"' /tmp/license-health.json >/dev/null; then
              echo "Custom-domain License API is ready"
              exit 0
            fi
            echo "Waiting for custom domain: attempt $attempt/36, HTTP ${status:-network-error}"
            sleep 5
          done
          cat /tmp/license-health.json 2>/dev/null || true
          exit 1

      - name: Run online license smoke test through custom domain
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://license.xn--8pv109c.top"
          json_header='Content-Type: application/json'

          login_payload="$(jq -n --arg password "$LICENSE_ADMIN_PASSWORD" '{password:$password}')"
          login_response="$(curl -fsS -X POST -H "$json_header" \
            --data "$login_payload" "$endpoint/v1/admin/login")"
          admin_token="$(printf '%s' "$login_response" | jq -er '.token')"

          create_response="$(curl -fsS -X POST \
            -H "$json_header" \
            -H "Authorization: Bearer $admin_token" \
            --data '{"count":1,"durationDays":1,"maxDevices":1,"note":"custom-domain-ci-test"}' \
            "$endpoint/v1/admin/licenses/create")"
          license_key="$(printf '%s' "$create_response" | jq -er '.licenses[0].key')"
          device_hash="$(printf 'b%.0s' $(seq 1 64))"

          activate_payload="$(jq -n --arg key "$license_key" --arg device "$device_hash" \
            '{licenseKey:$key,deviceId:$device,deviceLabel:"GitHub Actions",appVersion:4}')"
          activate_response="$(curl -fsS -X POST -H "$json_header" \
            --data "$activate_payload" "$endpoint/v1/activate")"
          session_token="$(printf '%s' "$activate_response" | jq -er '.token')"
          printf '%s' "$activate_response" | jq -e '.ok == true and .offlineGraceSeconds == 86400' >/dev/null

          check_payload="$(jq -n --arg token "$session_token" --arg device "$device_hash" \
            '{token:$token,deviceId:$device,appVersion:4}')"
          check_response="$(curl -fsS -X POST -H "$json_header" \
            --data "$check_payload" "$endpoint/v1/check")"
          printf '%s' "$check_response" | jq -e '.ok == true' >/dev/null

          disable_payload="$(jq -n --arg key "$license_key" \
            '{licenseKey:$key,action:"disable"}')"
          curl -fsS -X POST -H "$json_header" \
            -H "Authorization: Bearer $admin_token" \
            --data "$disable_payload" "$endpoint/v1/admin/licenses/action" \
            | jq -e '.ok == true' >/dev/null

          disabled_status="$(curl --silent --show-error -X POST -H "$json_header" \
            --data "$check_payload" \
            --output /tmp/disabled-check.json \
            --write-out '%{http_code}' \
            "$endpoint/v1/check")"
          test "$disabled_status" = "403"
          jq -e '.ok == false and .code == "license_disabled"' /tmp/disabled-check.json >/dev/null
          echo "Custom-domain online license smoke test passed"
