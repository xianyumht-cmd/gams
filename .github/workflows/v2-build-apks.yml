name: Build GG V2 client and manager APKs

on:
  push:
    branches:
      - v2-server-authoritative
    paths:
      - v2/android/**
      - .github/workflows/v2-build-apks.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APKs
        working-directory: v2/android
        run: gradle --no-daemon :client:assembleRelease :manager:assembleRelease

      - name: Verify packages and absence of core JavaScript
        shell: bash
        run: |
          set -euo pipefail
          client="v2/android/client/build/outputs/apk/release/client-release.apk"
          manager="v2/android/manager/build/outputs/apk/release/manager-release.apk"
          test -s "$client"
          test -s "$manager"

          mkdir -p /tmp/v2-client-apk /tmp/v2-manager-apk /tmp/v2-output
          unzip -q "$client" -d /tmp/v2-client-apk
          unzip -q "$manager" -d /tmp/v2-manager-apk

          for marker in \
            webpackChunk_lodash_modules \
            SAL_getUserData \
            createBuyOrder \
            get_goods_list \
            '脚本加载完成~' \
            space-z.ai \
            noname-1.1.1.js \
            game-1.0.2.js \
            /release/noname- \
            /engine/stable.js; do
            if grep -aR -F -q -- "$marker" /tmp/v2-client-apk; then
              echo "Core leakage marker found in V2 client APK: $marker"
              exit 1
            fi
          done

          if find /tmp/v2-client-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo "JavaScript file found inside V2 client APK"
            find /tmp/v2-client-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \)
            exit 1
          fi

          aapt dump badging "$client" | grep -q "package: name='com.jinli.ggsecure'"
          aapt dump badging "$manager" | grep -q "package: name='com.jinli.ggsecure.manager'"

          cp "$client" /tmp/v2-output/GG-V2-客户端-2.0.0-test1.apk
          cp "$manager" /tmp/v2-output/GG-V2-管理器-2.0.0-test1.apk
          sha256sum /tmp/v2-output/*.apk | tee /tmp/v2-output/SHA256SUMS.txt
          cat > /tmp/v2-output/SECURITY-CHECK.txt <<'EOF'
          V2 client package: com.jinli.ggsecure
          V2 manager package: com.jinli.ggsecure.manager
          Core JavaScript assets: absent
          Known plaintext core markers in APK: absent
          Runtime mode: authenticated encrypted bundle, native memory decryption, WebView memory interception
          V1 version 8: unchanged and still active
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: GG-V2-client-and-manager-2.0.0-test1
          path: /tmp/v2-output/*
          retention-days: 30
          if-no-files-found: error
