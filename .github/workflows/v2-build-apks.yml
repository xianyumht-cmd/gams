name: Build GG 2.0.1 formal client release

on:
  push:
    branches:
      - main
    paths:
      - v2/android/client/**
      - v2/android/build.gradle.kts
      - v2/android/settings.gradle.kts
      - v2/android/gradle.properties
      - .github/workflows/v2-build-apks.yml
  pull_request:
    branches:
      - main
    paths:
      - v2/android/client/**
      - v2/android/build.gradle.kts
      - v2/android/settings.gradle.kts
      - v2/android/gradle.properties
      - .github/workflows/v2-build-apks.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build formal release client
        working-directory: v2/android
        run: gradle --no-daemon :client:clean :client:assembleRelease

      - name: Verify formal release package
        shell: bash
        run: |
          set -euo pipefail
          client="$(find v2/android/client/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n1)"
          test -n "$client" && test -s "$client"

          client_version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' v2/android/client/build.gradle.kts | head -n1)"
          client_code="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' v2/android/client/build.gradle.kts | head -n1)"
          test "$client_version" = "2.0.1"
          test "$client_code" = "10"

          rm -rf /tmp/gg-client-apk /tmp/gg-release
          mkdir -p /tmp/gg-client-apk /tmp/gg-release/tools
          unzip -q "$client" -d /tmp/gg-client-apk

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          aapt_bin="$(find "$sdk_root/build-tools" -type f -name aapt -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          apksigner_bin="$(find "$sdk_root/build-tools" -type f -name apksigner -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          test -n "$aapt_bin" && test -x "$aapt_bin"
          test -n "$apksigner_bin" && test -x "$apksigner_bin"
          apksigner_jar="$(dirname "$apksigner_bin")/lib/apksigner.jar"
          test -s "$apksigner_jar"

          client_badging="$($aapt_bin dump badging "$client")"
          printf '%s\n' "$client_badging" | grep -q "package: name='com.jinli.quickweb' versionCode='10' versionName='2.0.1'"
          printf '%s\n' "$client_badging" | grep -q "application-label:'GG'"
          printf '%s\n' "$client_badging" | grep -Eq "application-icon-|application: label='GG'.*icon="

          if "$apksigner_bin" verify "$client" >/tmp/gg-client-signature.txt 2>&1; then
            echo 'The release input must remain unsigned before the fixed production certificate is applied.'
            exit 1
          fi

          for marker in \
            webpackChunk_lodash_modules \
            SAL_getUserData \
            createBuyOrder \
            get_goods_list \
            '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/gg-client-apk; then
              echo "Core implementation marker found in client APK: $marker"
              exit 1
            fi
          done

          if find /tmp/gg-client-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo 'JavaScript file found inside client APK.'
            exit 1
          fi

          cp "$client" "/tmp/gg-release/GG-${client_version}-code${client_code}-固定签名前.apk"
          cp "$apksigner_jar" /tmp/gg-release/tools/apksigner.jar
          cp "$aapt_bin" /tmp/gg-release/tools/aapt
          chmod +x /tmp/gg-release/tools/aapt
          sha256sum /tmp/gg-release/*.apk > /tmp/gg-release/SHA256SUMS.txt
          cat > /tmp/gg-release/RELEASE-INFO.txt <<EOF
          GG ${client_version} 正式版（固定证书签名前）
          versionCode: ${client_code}
          packageName: com.jinli.quickweb
          applicationName: GG
          必须使用证书 SHA-256：F2:20:C5:D4:75:13:C7:44:CB:9B:5F:17:C0:F8:F3:9B:0C:10:9F:8F:7D:C8:92:98:97:13:EE:F3:3F:DB:E0:C4
          tools/apksigner.jar 与 tools/aapt 仅用于离线固定证书签名和校验。
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: GG-2.0.1-formal-client-release-input
          path: /tmp/gg-release/**
          retention-days: 90
          if-no-files-found: error

      - name: Publish unsigned build locator
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-download
          cat > release-download/latest-unsigned-build.json <<EOF
          {"ok":true,"run_id":${GITHUB_RUN_ID},"artifact_name":"GG-2.0.1-formal-client-release-input","versionName":"2.0.1","versionCode":10}
          EOF
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f release-download/latest-unsigned-build.json
          git commit -m "Publish GG 2.0.1 unsigned build locator" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
