name: Build GG 2.0.0 formal client release

on:
  push:
    branches:
      - main
    paths:
      - v2/android/client/**
      - v2/android/build.gradle.kts
      - v2/android/settings.gradle.kts
      - v2/android/gradle.properties
      - .github/workflows/v2-build-apks.yml
  pull_request:
    branches:
      - main
    paths:
      - v2/android/client/**
      - v2/android/build.gradle.kts
      - v2/android/settings.gradle.kts
      - v2/android/gradle.properties
      - .github/workflows/v2-build-apks.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build formal release client
        working-directory: v2/android
        run: gradle --no-daemon :client:clean :client:assembleRelease

      - name: Verify formal release package
        shell: bash
        run: |
          set -euo pipefail
          client="$(find v2/android/client/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n1)"
          test -n "$client" && test -s "$client"

          client_version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' v2/android/client/build.gradle.kts | head -n1)"
          client_code="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' v2/android/client/build.gradle.kts | head -n1)"
          test "$client_version" = "2.0.0"
          test "$client_code" = "9"

          rm -rf /tmp/gg-client-apk /tmp/gg-release
          mkdir -p /tmp/gg-client-apk /tmp/gg-release
          unzip -q "$client" -d /tmp/gg-client-apk

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          aapt_bin="$(find "$sdk_root/build-tools" -type f -name aapt -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          apksigner_bin="$(find "$sdk_root/build-tools" -type f -name apksigner -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          test -n "$aapt_bin" && test -x "$aapt_bin"
          test -n "$apksigner_bin" && test -x "$apksigner_bin"

          client_badging="$($aapt_bin dump badging "$client")"
          printf '%s\n' "$client_badging" | grep -q "package: name='com.jinli.quickweb' versionCode='9' versionName='2.0.0'"
          printf '%s\n' "$client_badging" | grep -q "application-label:'GG'"
          printf '%s\n' "$client_badging" | grep -Eq "application-icon-|application: label='GG'.*icon="

          if "$apksigner_bin" verify "$client" >/tmp/gg-client-signature.txt 2>&1; then
            echo 'The pre-hardening package must remain unsigned so the production certificate can be applied after hardening.'
            exit 1
          fi

          for marker in \
            webpackChunk_lodash_modules \
            SAL_getUserData \
            createBuyOrder \
            get_goods_list \
            '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/gg-client-apk; then
              echo "Core implementation marker found in client APK: $marker"
              exit 1
            fi
          done

          if find /tmp/gg-client-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo 'JavaScript file found inside client APK.'
            exit 1
          fi

          cp "$client" "/tmp/gg-release/GG-${client_version}-code${client_code}-加固签名前.apk"
          sha256sum /tmp/gg-release/*.apk > /tmp/gg-release/SHA256SUMS.txt
          cat > /tmp/gg-release/RELEASE-INFO.txt <<EOF
          GG ${client_version} 正式版
          versionCode: ${client_code}
          packageName: com.jinli.quickweb
          applicationName: GG
          当前文件用于正式加固和原证书签名，签名完成后再对外发布。
          必须使用证书 SHA-256：F2:20:C5:D4:75:13:C7:44:CB:9B:5F:17:C0:F8:F3:9B:0C:10:9F:8F:7D:C8:92:98:97:13:EE:F3:3F:DB:E0:C4
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: GG-2.0.0-formal-client-release-input
          path: /tmp/gg-release/*
          retention-days: 90
          if-no-files-found: error
