name: One-shot small-screen menu patch

on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-small-screen-menu.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/patch-small-screen-menu.py
      - run: node --check remote-script/src/noname.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add remote-script/src/noname.js
          git commit -m "Constrain remote menu on small Android screens"
          git push
