name: Inspect fixed JKS inventory

on:
  push:
    branches:
      - diag/fixed-jks-inventory
    paths:
      - .github/workflows/diag-fixed-jks-inventory.yml

permissions:
  contents: write

env:
  GG_RELEASE_KEYSTORE_BASE64: ${{ secrets.GG_RELEASE_KEYSTORE_BASE64 }}
  GG_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.GG_RELEASE_KEYSTORE_PASSWORD }}

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/fixed-jks-inventory
      - name: Inspect signing material safely
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path('.')
          candidates = sorted([
              p for p in root.rglob('*')
              if p.is_file() and p.suffix.lower() in {'.jks', '.keystore'} and '.git' not in p.parts
          ])
          properties = sorted([
              p for p in root.rglob('*.properties')
              if p.is_file() and '.git' not in p.parts and ('key' in p.name.lower() or 'sign' in p.name.lower() or 'store' in p.name.lower())
          ])

          password = os.environ.get('GG_RELEASE_KEYSTORE_PASSWORD', '')
          password_source = 'actions_secret' if password else ''
          if not password:
              for path in properties:
                  for line in path.read_text(encoding='utf-8', errors='ignore').splitlines():
                      if line.strip().startswith('storePassword') and '=' in line:
                          value = line.split('=', 1)[1].strip()
                          if value:
                              password = value
                              password_source = str(path)
                              break
                  if password:
                      break

          secret_b64 = os.environ.get('GG_RELEASE_KEYSTORE_BASE64', '')
          if secret_b64:
              import base64
              secret_path = Path('/tmp/GG-release-secret.jks')
              secret_path.write_bytes(base64.b64decode(secret_b64))
              candidates.append(secret_path)

          result = {
              'repositoryJksCandidates': [],
              'propertyFiles': [
                  {
                      'path': str(path),
                      'hasStorePassword': any(
                          line.strip().startswith('storePassword') and '=' in line and bool(line.split('=', 1)[1].strip())
                          for line in path.read_text(encoding='utf-8', errors='ignore').splitlines()
                      ),
                  }
                  for path in properties
              ],
              'actionsSecretKeystorePresent': bool(secret_b64),
              'actionsSecretPasswordPresent': bool(os.environ.get('GG_RELEASE_KEYSTORE_PASSWORD', '')),
              'effectivePasswordAvailable': bool(password),
              'effectivePasswordSource': password_source,
              'validFixedCertificate': None,
          }

          expected = 'F220C5D47513C744CB9B5F17C0F8F39B0C109F8F7DC892989713EEF33FDBE0C4'
          for path in candidates:
              data = path.read_bytes()
              entry = {
                  'path': 'GitHub Actions fixed JKS secret' if str(path).startswith('/tmp/') else str(path),
                  'size': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'aliasGgReleaseReadable': False,
                  'certificateSha256': '',
                  'matchesExpectedCertificate': False,
              }
              if password:
                  check = subprocess.run(
                      ['keytool', '-list', '-keystore', str(path), '-storepass', password, '-alias', 'gg-release'],
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )
                  entry['aliasGgReleaseReadable'] = check.returncode == 0
                  if check.returncode == 0:
                      export = subprocess.run(
                          ['keytool', '-exportcert', '-rfc', '-keystore', str(path), '-storepass', password, '-alias', 'gg-release'],
                          capture_output=True,
                      )
                      if export.returncode == 0:
                          openssl = subprocess.run(
                              ['openssl', 'x509', '-noout', '-fingerprint', '-sha256'],
                              input=export.stdout,
                              capture_output=True,
                          )
                          if openssl.returncode == 0:
                              value = openssl.stdout.decode(errors='ignore').strip().split('=', 1)[-1].replace(':', '').upper()
                              entry['certificateSha256'] = value
                              entry['matchesExpectedCertificate'] = value == expected
                              if value == expected:
                                  result['validFixedCertificate'] = entry['path']
              result['repositoryJksCandidates'].append(entry)

          Path('diagnostics/fixed-jks-inventory.json').parent.mkdir(parents=True, exist_ok=True)
          Path('diagnostics/fixed-jks-inventory.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
      - name: Commit report and remove diagnostic workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/diag-fixed-jks-inventory.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record fixed JKS inventory"
          git push origin HEAD:diag/fixed-jks-inventory
