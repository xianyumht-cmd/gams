name: Inspect official game alert contexts
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-inspect-official-alert-context.yml]
permissions:
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Fetch and inspect
        shell: bash
        run: |
          set -euo pipefail
          curl -LfsS --retry 3 --max-time 180 -A 'Mozilla/5.0 (Linux; Android 13)' 'https://c2.cgyouxi.com/website/hfplayer/v3/bin/official/game.js?v=202607090001' -o /tmp/official-game.js
          python3 - <<'PY'
          import json,re
          from pathlib import Path
          text=Path('/tmp/official-game.js').read_text(encoding='utf-8',errors='replace')
          terms=['脚本','加载','完成','alert','SAL_alert','脚本加载完成~']
          contexts={}
          for term in terms:
            hits=[]
            for m in re.finditer(re.escape(term),text):
              a=max(0,m.start()-300);b=min(len(text),m.end()+300)
              hits.append({'offset':m.start(),'context':text[a:b]})
            contexts[term]=hits[:100]
          # literal concatenation candidates near Chinese fragments
          combined=[]
          for term in ['脚本','加载','完成']:
            for item in contexts[term]:
              c=item['context']
              if 'alert' in c or 'SAL_alert' in c or 'window[' in c:
                combined.append({'term':term,**item})
          report={'terms':{k:len(v) for k,v in contexts.items()},'contexts':contexts,'alertAdjacentChinese':combined}
          Path('docs/diagnostics').mkdir(parents=True,exist_ok=True)
          Path('docs/diagnostics/official-game-alert-context-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps({'terms':report['terms'],'alertAdjacentChinese':combined},ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-inspect-official-alert-context.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record official game alert string contexts'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
