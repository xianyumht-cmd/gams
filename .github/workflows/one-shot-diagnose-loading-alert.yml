name: Diagnose GG loading alert source

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-diagnose-loading-alert.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser runtime
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Trace alerts with APK-equivalent interception
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          cat > trace-alert.mjs <<'JS'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const noname = fs.readFileSync('remote-script/release/noname-1.1.2.js', 'utf8');
          const game = fs.readFileSync('game-engine/release/game-1.0.4.js', 'utf8');
          const targets = [
            'https://m.66rpg.com/h5/219126?ohp=v3&quality=32',
            'https://m.66rpg.com/h5/555462?ohp=v3&quality=32',
            'https://m.66rpg.com/h5/4811?quality=31'
          ];
          const report = {
            generatedAt: new Date().toISOString(),
            nonameVersion: '1.1.2',
            engineVersion: '1.0.4',
            targets: [],
          };

          const browser = await chromium.launch({ headless: true });
          for (const target of targets) {
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Linux; Android 13; GG/2.0.1) AppleWebKit/537.36 Chrome/138 Mobile Safari/537.36',
              viewport: { width: 412, height: 915 },
              ignoreHTTPSErrors: true,
            });
            const page = await context.newPage();
            const item = { target, alerts: [], dialogs: [], requests: [], console: [], errors: [] };

            await page.addInitScript(() => {
              const records = [];
              const diagnosticAlert = function(message) {
                const record = {
                  message: String(message),
                  stack: String(new Error('GG_ALERT_CALL').stack || ''),
                  href: location.href,
                  at: Date.now(),
                };
                records.push(record);
                console.log('__GG_ALERT__' + JSON.stringify(record));
              };
              Object.defineProperty(window, '__gg_alert_records__', {
                value: records,
                configurable: false,
                enumerable: false,
                writable: false,
              });
              Object.defineProperty(window, 'alert', {
                configurable: false,
                enumerable: true,
                get() { return diagnosticAlert; },
                set(value) {
                  console.log('__GG_ALERT_REPLACEMENT__' + String(value));
                },
              });
            });

            await page.addInitScript({
              content: `(function(){if(window.__GG_V2_CONTROL_LOADED__)return;window.__GG_V2_CONTROL_LOADED__=true;try{\n${noname}\n}catch(e){window.__GG_V2_CONTROL_LOADED__=false;console.error('[GG]',e);}})();\n//# sourceURL=gg-noname-1.1.2.js`
            });

            await page.route('**/*', async route => {
              const url = route.request().url();
              const lower = url.toLowerCase();
              const kind = route.request().resourceType();
              if (item.requests.length < 500) item.requests.push({ url, kind });

              if (lower.includes('c2.cgyouxi.com/website/hfplayer/') && lower.includes('/bin/official/game.js')) {
                await route.fulfill({
                  status: 200,
                  contentType: 'application/javascript; charset=utf-8',
                  headers: { 'Cache-Control': 'no-store' },
                  body: 'window.__gg_official_engine_blocked__=true;\n//# sourceURL=gg-official-engine-blocked.js',
                });
                return;
              }
              if (lower === 'https://ggv2.local/runtime/game.js'
                  || lower.includes('gams-script-edge.2320006072.workers.dev/engine/stable.js')
                  || lower.includes('space-z.ai/game.js')) {
                await route.fulfill({
                  status: 200,
                  contentType: 'application/javascript; charset=utf-8',
                  headers: { 'Cache-Control': 'no-store' },
                  body: `${game}\n//# sourceURL=gg-game-1.0.4.js`,
                });
                return;
              }
              if (lower.includes('raw.githubusercontent.com/xianyumht-cmd/gams')
                  && (lower.includes('/remote-script/') || lower.includes('/game-engine/'))) {
                await route.fulfill({ status: 403, contentType: 'text/plain', body: '' });
                return;
              }
              await route.continue();
            });

            page.on('console', msg => {
              const text = msg.text();
              if (text.startsWith('__GG_ALERT__')) {
                try { item.alerts.push(JSON.parse(text.slice('__GG_ALERT__'.length))); }
                catch { item.console.push({ type: msg.type(), text }); }
              } else if (text.includes('GG') || text.includes('脚本') || text.includes('加载')) {
                item.console.push({ type: msg.type(), text });
              }
            });
            page.on('dialog', async dialog => {
              item.dialogs.push({ type: dialog.type(), message: dialog.message() });
              await dialog.dismiss();
            });
            page.on('pageerror', error => item.errors.push(String(error.stack || error)));

            try {
              await page.goto(target, { waitUntil: 'domcontentloaded', timeout: 60000 });
              await page.waitForTimeout(30000);
              item.finalUrl = page.url();
              item.runtimeProbe = await page.evaluate(() => window.__gg_runtime_probe__ || null).catch(() => null);
              item.engineState = await page.evaluate(() => window.__gg_engine_load_state__ || null).catch(() => null);
              item.officialBlocked = await page.evaluate(() => window.__gg_official_engine_blocked__ || false).catch(() => false);
              const inPageAlerts = await page.evaluate(() => window.__gg_alert_records__ || []).catch(() => []);
              for (const entry of inPageAlerts) {
                if (!item.alerts.some(x => x.at === entry.at && x.message === entry.message)) item.alerts.push(entry);
              }
            } catch (error) {
              item.errors.push(String(error.stack || error));
            }
            report.targets.push(item);
            await context.close();
          }
          await browser.close();

          fs.writeFileSync(
            'diagnostics/loading-alert-runtime-trace.json',
            JSON.stringify(report, null, 2) + '\n',
            'utf8'
          );
          console.log(JSON.stringify(report.targets.map(x => ({
            target: x.target,
            alerts: x.alerts,
            dialogs: x.dialogs,
            runtimeProbe: x.runtimeProbe,
            engineState: x.engineState,
            officialBlocked: x.officialBlocked,
            errors: x.errors.slice(0, 3),
          })), null, 2));
          JS
          node trace-alert.mjs

      - name: Commit diagnosis report
        shell: bash
        run: |
          set -euo pipefail
          rm -f trace-alert.mjs package.json package-lock.json
          rm -rf node_modules
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/loading-alert-runtime-trace.json
          git commit -m "Record loading alert runtime source trace"
          git pull --rebase origin main
          git push origin HEAD:main
