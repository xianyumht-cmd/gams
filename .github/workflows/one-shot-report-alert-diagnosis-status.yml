name: Report alert diagnosis status

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-report-alert-diagnosis-status.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record matching workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=30" \
            --jq '[.workflow_runs[] | select(.name == "Diagnose GG loading alert source") | {id,name,status,conclusion,head_sha,html_url,created_at,updated_at}]' \
            > diagnostics/loading-alert-workflow-status.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/loading-alert-workflow-status.json
          git commit -m "Record alert diagnosis workflow status"
          git pull --rebase origin main
          git push origin HEAD:main
