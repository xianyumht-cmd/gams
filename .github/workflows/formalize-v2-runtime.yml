name: Formalize GG 2.0.0 runtime source

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/formalize-v2-runtime.yml

permissions:
  contents: write

jobs:
  formalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply formal production wording and release source
        shell: python
        run: |
          from pathlib import Path

          source_path = Path("v2/runtime/src/index.js")
          source = source_path.read_text(encoding="utf-8")
          replacements = {
              "https://raw.githubusercontent.com/xianyumht-cmd/gams/v2-server-authoritative/v2/runtime/release/":
                  "https://raw.githubusercontent.com/xianyumht-cmd/gams/main/v2/runtime/release/",
              'message: "V2运行服务暂时不可用"': 'message: "服务暂时不可用"',
              '"V2客户端版本过低"': '"客户端版本过低"',
              '"V2设备验证信息无效"': '"设备验证信息无效"',
              '"V2运行密钥无效"': '"运行密钥无效"',
              '"V2运行密钥校验失败"': '"运行密钥校验失败"',
              '"V2初始化过于频繁"': '"启动过于频繁"',
              '"缺少V2授权会话"': '"登录状态已失效"',
              '"V2运行版本已更新，请重新初始化"': '"服务已更新，请重新启动"',
              '"V2运行包请求过于频繁"': '"请求过于频繁，请稍后重试"',
              '"V2加密运行包暂时不可用"': '"服务资源暂时不可用"',
              '"V2加密运行包大小校验失败"': '"服务资源校验失败"',
              '"V2加密运行包完整性校验失败"': '"服务资源校验失败"',
              '"当前设备未绑定V2安全身份"': '"当前设备未完成授权"',
              '"V2签名请求无效"': '"设备验证信息无效"',
              '"V2请求已过期"': '"验证请求已过期"',
              '"V2请求摘要不匹配"': '"设备验证失败"',
              '"V2客户端签名发生变化"': '"客户端校验失败"',
              '"V2验证请求已失效"': '"验证请求已失效"',
              '"V2设备签名校验失败"': '"设备验证失败"',
              '"V2运行清单暂时不可用"': '"服务配置暂时不可用"',
              '"V2运行清单异常"': '"服务配置异常"',
              '"V2运行清单格式无效"': '"服务配置异常"',
              '"V2运行清单内容无效"': '"服务配置异常"',
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f"expected text not found: {old}")
              source = source.replace(old, new)
          source_path.write_text(source, encoding="utf-8", newline="\n")
          Path(".github/workflows/formalize-v2-runtime.yml").unlink()

      - name: Commit formal runtime source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v2/runtime/src/index.js .github/workflows/formalize-v2-runtime.yml
          git commit -m "Formalize GG 2.0.0 runtime source"
          git push origin HEAD:main
