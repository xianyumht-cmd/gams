name: Inspect project tree

on:
  push:
    branches:
      - online-license-backend
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate WebView and script files
        run: |
          echo '=== CLIENT FILES ==='
          find client/src/main -type f -print | sort
          echo '=== MATCHES ==='
          grep -RIn --exclude='*.bin' -E 'noname|evaluateJavascript|loadUrl|WebView|openRawResource|assets' client/src/main || true
