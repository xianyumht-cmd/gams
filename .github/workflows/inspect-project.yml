name: Inspect project tree

on:
  push:
    branches:
      - online-license-backend
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare repository snapshot
        run: |
          tar --exclude=.git -czf /tmp/repository-snapshot.tar.gz .
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repository-source-inspection
          path: /tmp/repository-snapshot.tar.gz
          retention-days: 1
