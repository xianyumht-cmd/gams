name: Inspect project tree

on:
  push:
    branches:
      - online-license-backend
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare source snapshot
        run: |
          mkdir -p inspection
          cp -R client/src/main inspection/client-main
          cp client/build.gradle.kts inspection/client-build.gradle.kts
          cp settings.gradle.kts inspection/settings.gradle.kts
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: client-source-inspection
          path: inspection
          retention-days: 1
