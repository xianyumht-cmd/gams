name: Map hidden engine loader target
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-map-engine-loader-symbol.yml]
permissions:
  contents: write
jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Extract loader symbol contexts
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re
          from pathlib import Path
          path=Path('remote-script/src/noname.js')
          text=path.read_text(encoding='utf-8')
          lines=text.splitlines()
          names=['Oftxw5','Epe456s','XBbHBMQ','DjkL_Q']
          report={
            'directOldPreviewCount': text.count('https://preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js'),
            'directStableCount': text.count('https://gams-script-edge.2320006072.workers.dev/engine/stable.js'),
            'contexts':{}
          }
          for name in names:
            hits=[]
            for i,line in enumerate(lines):
              if name in line:
                hits.append({'line':i+1,'context':'\n'.join(lines[max(0,i-3):min(len(lines),i+4)])})
            report['contexts'][name]=hits
          Path('docs/diagnostics').mkdir(parents=True, exist_ok=True)
          Path('docs/diagnostics/engine-loader-symbol-map-20260723.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-shot-map-engine-loader-symbol.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record hidden engine loader symbol map'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 2; done
          exit 1
