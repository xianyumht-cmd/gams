name: Verify GG 2.0.0 release artifact

on:
  pull_request:
    branches:
      - v2-server-authoritative
    paths:
      - v2/android/client/**
      - .github/workflows/verify-gg-2.0.0-pr.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release candidate
        working-directory: v2/android
        run: gradle --no-daemon :client:assembleRelease

      - name: Verify identity, icon and core boundary
        shell: bash
        run: |
          set -euo pipefail
          apk="v2/android/client/build/outputs/apk/release/client-release.apk"
          test -s "$apk"
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          aapt_bin="$(find "$sdk_root/build-tools" -type f -name aapt -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          apksigner_bin="$(find "$sdk_root/build-tools" -type f -name apksigner -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          test -x "$aapt_bin" && test -x "$apksigner_bin"
          badging="$($aapt_bin dump badging "$apk")"
          printf '%s\n' "$badging" | grep -q "package: name='com.jinli.quickweb' versionCode='9' versionName='2.0.0'"
          printf '%s\n' "$badging" | grep -q "application-label:'GG'"
          printf '%s\n' "$badging" | grep -q "application-icon-"
          "$apksigner_bin" verify --verbose "$apk"

          rm -rf /tmp/gg-apk /tmp/gg-release
          mkdir -p /tmp/gg-apk /tmp/gg-release
          unzip -q "$apk" -d /tmp/gg-apk
          if find /tmp/gg-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo "JavaScript file found inside APK"
            exit 1
          fi
          for marker in webpackChunk_lodash_modules SAL_getUserData createBuyOrder get_goods_list '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/gg-apk; then
              echo "Core implementation marker found: $marker"
              exit 1
            fi
          done

          cp "$apk" "/tmp/gg-release/GG-2.0.0-v9-待加固待正式签名.apk"
          sha256sum /tmp/gg-release/*.apk > /tmp/gg-release/SHA256SUMS.txt
          cat > /tmp/gg-release/RELEASE-NOTES.txt <<'EOF'
          Package: com.jinli.quickweb
          Version code: 9
          Version name: 2.0.0
          App label: GG
          Launcher icon: present
          Upgrade target: GG 1.4.0 versionCode 8
          Core JavaScript assets: absent
          Known plaintext core markers: absent
          Legacy state migration: install ID and license key only
          Legacy runtime disk cache: deleted on startup

          This build uses the repository test/debug signing key.
          After hardening, sign with the exact production key used for GG 1.4.0.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: GG-2.0.0-v9-release-candidate
          path: /tmp/gg-release/*
          retention-days: 30
          if-no-files-found: error
