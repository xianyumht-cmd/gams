name: Inspect runtime embedded noname source

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-inspect-runtime-noname.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compare runtime-build and current noname source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics /tmp/runtime-noname
          git show 9a55b939a720bfa8cd65ed25a6168c43d51eb496:remote-script/src/noname.js > /tmp/runtime-noname/noname-at-runtime-release.js
          cp remote-script/src/noname.js /tmp/runtime-noname/noname-current.js
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, json

          old = Path('/tmp/runtime-noname/noname-at-runtime-release.js').read_bytes()
          current = Path('/tmp/runtime-noname/noname-current.js').read_bytes()
          fragmented = b'preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js'
          fragments = [b'preview-chat-1', b'b176371-f9a', b'b-4760-b15c', b'-b9d70ed59d', b'23.space-z.', b'ai/game.js']
          stable = b'gams-script-edge.2320006072.workers.dev/engine/stable.js'
          report = {
            'runtimeReleaseCommit': '9a55b939a720bfa8cd65ed25a6168c43d51eb496',
            'runtimeManifestExpectedNoname': {
              'size': 331460,
              'sha256': 'ea21bcb2a66b0d48f4983ae91956fc52635417ae1839cc592aa739ea5b1bd6ee'
            },
            'atRuntimeRelease': {
              'size': len(old),
              'sha256': hashlib.sha256(old).hexdigest(),
              'fullPreviewUrlCount': old.count(fragmented),
              'fragmentCounts': {x.decode(): old.count(x) for x in fragments},
              'stableUrlCount': old.count(stable),
              'loadingPhraseCount': old.count('脚本加载完成~'.encode()),
            },
            'current': {
              'size': len(current),
              'sha256': hashlib.sha256(current).hexdigest(),
              'fullPreviewUrlCount': current.count(fragmented),
              'fragmentCounts': {x.decode(): current.count(x) for x in fragments},
              'stableUrlCount': current.count(stable),
              'loadingPhraseCount': current.count('脚本加载完成~'.encode()),
            },
            'sameBytes': old == current,
          }
          Path('diagnostics/runtime-noname-comparison.json').write_text(
            json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY
      - name: Commit report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/runtime-noname-comparison.json
          git commit -m "Record runtime embedded noname comparison"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
