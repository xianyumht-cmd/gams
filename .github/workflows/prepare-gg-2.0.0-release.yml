name: Prepare GG 2.0.0 release candidate

on:
  push:
    branches:
      - release/gg-2.0.0-v9
    paths:
      - .github/workflows/prepare-gg-2.0.0-release.yml

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/gg-2.0.0-v9
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Prepare release identity and migration
        run: python3 tools/prepare_gg_release_candidate.py

      - name: Build client release candidate
        working-directory: v2/android
        run: gradle --no-daemon :client:assembleRelease

      - name: Verify package, icon, version and security boundary
        shell: bash
        run: |
          set -euo pipefail
          apk="v2/android/client/build/outputs/apk/release/client-release.apk"
          test -s "$apk"

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          aapt_bin="$(find "$sdk_root/build-tools" -type f -name aapt -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          apksigner_bin="$(find "$sdk_root/build-tools" -type f -name apksigner -perm -u+x 2>/dev/null | sort -V | tail -n1)"
          test -x "$aapt_bin"
          test -x "$apksigner_bin"

          badging="$($aapt_bin dump badging "$apk")"
          printf '%s\n' "$badging" | grep -q "package: name='com.jinli.quickweb' versionCode='9' versionName='2.0.0'"
          printf '%s\n' "$badging" | grep -q "application-label:'GG'"
          printf '%s\n' "$badging" | grep -q "application-icon-"
          "$apksigner_bin" verify --verbose "$apk"

          rm -rf /tmp/gg-release-apk /tmp/gg-release-output
          mkdir -p /tmp/gg-release-apk /tmp/gg-release-output
          unzip -q "$apk" -d /tmp/gg-release-apk

          if find /tmp/gg-release-apk -type f \( -name '*.js' -o -name 'game.js' -o -name 'noname.js' \) | grep -q .; then
            echo "JavaScript file found inside release candidate"
            exit 1
          fi

          for marker in \
            webpackChunk_lodash_modules \
            SAL_getUserData \
            createBuyOrder \
            get_goods_list \
            '脚本加载完成~'; do
            if grep -aR -F -q -- "$marker" /tmp/gg-release-apk; then
              echo "Core implementation marker found in APK: $marker"
              exit 1
            fi
          done

          cp "$apk" "/tmp/gg-release-output/GG-2.0.0-v9-待加固待正式签名.apk"
          sha256sum /tmp/gg-release-output/*.apk | tee /tmp/gg-release-output/SHA256SUMS.txt
          cat > /tmp/gg-release-output/RELEASE-NOTES.txt <<'EOF'
          Package: com.jinli.quickweb
          Version code: 9
          Version name: 2.0.0
          App label: GG
          Launcher icon: present
          Upgrade target: GG 1.4.0 versionCode 8
          Core JavaScript files in APK: absent
          Known plaintext core markers in APK: absent
          Runtime mode: authenticated encrypted bundle, native memory decryption, WebView memory interception
          Upgrade migration: preserves legacy install ID and license key when readable
          Legacy disk runtime cache: deleted on startup

          IMPORTANT:
          This candidate is signed with the repository test/debug key only for build validation.
          After hardening, sign the final APK with the exact same production key used for GG 1.4.0.
          A different signing key cannot update the installed 1.4.0 application.
          EOF

      - name: Commit verified release source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            v2/android/client/build.gradle.kts \
            v2/android/client/src/main/AndroidManifest.xml \
            v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java \
            v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java \
            v2/android/client/src/main/java/com/jinli/ggsecure/SecureStore.java
          git commit -m 'Prepare GG 2.0.0 production package identity and upgrade migration'
          git push origin HEAD:release/gg-2.0.0-v9

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: GG-2.0.0-v9-release-candidate
          path: /tmp/gg-release-output/*
          retention-days: 30
          if-no-files-found: error
