name: One-shot implement GG V2 encrypted runtime

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'v2-server-authoritative'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: v2-implementation
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
      KEY_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
      TARGET_BRANCH: v2-server-authoritative

    steps:
      - name: Checkout V2 branch
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" FETCH_HEAD
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test -n "${KEY_PASSWORD:-}"

      - name: Install V2 implementation files
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v2-implementation-payload/part00 \
              .github/v2-implementation-payload/part01 \
              .github/v2-implementation-payload/part02 \
              .github/v2-implementation-payload/part03 \
              .github/v2-implementation-payload/part04 \
              | tr -d '\r\n ' | base64 -d > /tmp/v2-implementation.tar.gz
          echo "5313bb5fadd05200e77d4a9e639419b9c26531437219622ba4051360ca25cc26  /tmp/v2-implementation.tar.gz" | sha256sum -c -
          tar -xzf /tmp/v2-implementation.tar.gz
          rm -f /tmp/v2-implementation.tar.gz

      - name: Build initial encrypted V2 release
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet cryptography
          script_file="$(jq -r '.file' remote-script/release/manifest.json)"
          game_file="$(jq -r '.file' game-engine/release/manifest.json)"
          test -s "remote-script/release/${script_file}"
          test -s "game-engine/release/${game_file}"
          rm -rf v2/runtime/release
          mkdir -p v2/runtime/release
          python3 v2/runtime/tools/build_release.py \
            "remote-script/release/${script_file}" \
            "game-engine/release/${game_file}" \
            "2.0.0-test1" \
            "${KEY_PASSWORD}" \
            v2/runtime/release

      - name: Sign and verify V2 release
        shell: bash
        run: |
          set -euo pipefail
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in remote-script/keys/private.pem.enc \
            -out /tmp/v2-private.pem \
            -pass env:KEY_PASSWORD
          openssl dgst -sha256 -sign /tmp/v2-private.pem \
            -out /tmp/v2-runtime.sig /tmp/v2-runtime-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/v2-runtime.sig /tmp/v2-runtime-canonical.txt
          python3 - <<'PY'
          import base64, hashlib, json
          from pathlib import Path
          manifest=json.loads(Path('/tmp/v2-runtime-unsigned.json').read_text())
          manifest['signatureAlgorithm']='SHA256withECDSA'
          manifest['signature']=base64.b64encode(Path('/tmp/v2-runtime.sig').read_bytes()).decode()
          release=Path('v2/runtime/release')
          (release/'manifest.json').write_text(
              json.dumps(manifest,ensure_ascii=False,indent=2)+'\n',
              encoding='utf-8')
          bundle=(release/manifest['file']).read_bytes()
          assert len(bundle)==manifest['size']
          assert hashlib.sha256(bundle).hexdigest()==manifest['sha256']
          forbidden=[b'webpackChunk_lodash_modules',b'SAL_getUserData',b'createBuyOrder',b'get_goods_list']
          assert all(marker not in bundle for marker in forbidden)
          print('signed encrypted release:',manifest['versionName'],len(bundle))
          PY
          rm -f /tmp/v2-private.pem /tmp/v2-runtime.sig \
            /tmp/v2-runtime-canonical.txt /tmp/v2-runtime-unsigned.json

      - name: Static validation
        shell: bash
        run: |
          set -euo pipefail
          node --check v2/runtime/src/index.js
          python3 -m py_compile v2/runtime/tools/build_release.py
          grep -q 'applicationId = "com.jinli.ggsecure"' v2/android/client/build.gradle.kts
          grep -q 'applicationId = "com.jinli.ggsecure.manager"' v2/android/manager/build.gradle.kts
          test ! -e v2/android/client/src/main/assets/noname.js
          test ! -e v2/android/client/src/main/assets/game.js
          if find v2/android -type f -name '*.js' | grep -q .; then
            echo "JavaScript must not be packaged inside V2 Android"
            find v2/android -type f -name '*.js'
            exit 1
          fi

      - name: Commit V2 implementation
        shell: bash
        run: |
          set -euo pipefail
          git add v2/android v2/runtime v2/README.md \
            .github/workflows/v2-build-apks.yml \
            .github/workflows/v2-deploy-runtime.yml \
            .github/workflows/v2-publish-runtime.yml
          git commit -m "Implement encrypted memory-only V2 runtime and isolated Android apps"
          git fetch -q origin "${TARGET_BRANCH}"
          git rebase "origin/${TARGET_BRANCH}"
          git push origin HEAD:"${TARGET_BRANCH}"
