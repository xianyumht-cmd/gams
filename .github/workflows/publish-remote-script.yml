name: One-shot self-hosted game engine migration runner

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-remote-script.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      KEY_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
      TARGET_BRANCH: engine-self-hosting-20260722
      EXTERNAL_GAME_URL: https://preview-chat-1b176371-f9ab-4760-b15c-b9d70ed59d23.space-z.ai/game.js
      EXTERNAL_GAME_SHA256: 51ae52887d0c0475870e4c985edf747a14672f0908221779826934f37b73db43
      EXTERNAL_GAME_SIZE: "11589175"
      SELF_HOSTED_ENGINE_URL: https://gams-script-edge.2320006072.workers.dev/engine/stable.js
      TEST_PAGE_URL: https://m.66rpg.com/h5/1690283?ohp=v3&quality=32

    steps:
      - name: Checkout main and migration branch
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin main "${TARGET_BRANCH}"
          git checkout -q FETCH_HEAD
          git worktree add /tmp/migration "origin/${TARGET_BRANCH}"
          cd /tmp/migration
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test -n "${KEY_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD is missing"; exit 1; }

      - name: Extract and run migration implementation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/one-shot-migrate-game-engine.yml').read_text(encoding='utf-8')
          marker="          cat > /tmp/migrate_engine.py <<'PY'\n"
          start=source.index(marker)+len(marker)
          end=source.index("\n          PY\n",start)
          block=source[start:end]
          lines=[line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/migrate_engine.py').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY
          python3 /tmp/migrate_engine.py

      - name: Sign engine release manifest
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/migration
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in remote-script/keys/private.pem.enc \
            -out /tmp/private.pem \
            -pass env:KEY_PASSWORD
          chmod 600 /tmp/private.pem
          openssl dgst -sha256 -sign /tmp/private.pem \
            -out /tmp/engine.sig /tmp/engine-manifest-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/engine.sig /tmp/engine-manifest-canonical.txt
          python3 - <<'PY'
          import base64,json
          from pathlib import Path
          m=json.loads(Path('/tmp/engine-manifest-unsigned.json').read_text(encoding='utf-8'))
          m['signatureAlgorithm']='SHA256withECDSA'
          m['signature']=base64.b64encode(Path('/tmp/engine.sig').read_bytes()).decode('ascii')
          Path('/tmp/migration/game-engine/release/manifest.json').write_text(json.dumps(m,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          rm -f /tmp/private.pem /tmp/engine.sig /tmp/engine-manifest-canonical.txt /tmp/engine-manifest-unsigned.json

      - name: Validate and push migration branch
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/migration
          node --check script-edge/src/index.js
          node --check remote-script/src/noname.js
          python3 - <<'PY'
          import base64,hashlib,json
          from pathlib import Path
          m=json.loads(Path('game-engine/release/manifest.json').read_text(encoding='utf-8'))
          b=(Path('game-engine/release')/m['file']).read_bytes()
          assert len(b)==m['size']==11589175
          assert hashlib.sha256(b).hexdigest()==m['sha256']=='51ae52887d0c0475870e4c985edf747a14672f0908221779826934f37b73db43'
          keys=('schemaVersion','channel','version','versionName','file','sha256','size','sourceUrl','minNonameVersion','publishedAt')
          Path('/tmp/check-canonical').write_text(''.join(f'{k}={m[k]}\n' for k in keys),encoding='utf-8',newline='\n')
          Path('/tmp/check.sig').write_bytes(base64.b64decode(m['signature'],validate=True))
          PY
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/check.sig /tmp/check-canonical
          grep -q '/engine/stable.js' script-edge/src/index.js
          grep -q 'version      1.1.1' remote-script/src/noname.js
          git add game-engine script-edge/src/index.js remote-script/src/noname.js \
            .github/workflows/publish-game-engine.yml \
            .github/workflows/validate-engine-release.yml \
            .github/workflows/monitor-upstream-engine.yml \
            .github/workflows/smoke-self-hosted-engine.yml
          git commit -m "Self-host modified game engine and add maintenance pipeline"
          git push origin HEAD:"${TARGET_BRANCH}"
