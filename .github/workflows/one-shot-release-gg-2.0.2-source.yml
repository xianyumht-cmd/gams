name: Release GG 2.0.2 alert suppression fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-release-gg-2.0.2-source.yml

permissions:
  contents: write

env:
  LICENSE_ADMIN_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
  ENGINE_VERSION: "1.0.5"
  RUNTIME_VERSION: "2.0.2-r1"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare App 2.0.2, script 1.1.3 and engine 1.0.5
        shell: bash
        run: |
          set -euo pipefail
          test -n "${LICENSE_ADMIN_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD is missing"; exit 1; }
          python -m pip install --quiet cryptography
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import hashlib, json

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected exactly one occurrence of {old!r}, got {text.count(old)}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Android App version.
          replace_once('v2/android/client/build.gradle.kts', 'versionCode = 10', 'versionCode = 11')
          replace_once('v2/android/client/build.gradle.kts', 'versionName = "2.0.1"', 'versionName = "2.0.2"')
          replace_once('v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java',
                       'private static final int PROTOCOL_APP_VERSION = 10;',
                       'private static final int PROTOCOL_APP_VERSION = 11;')
          replace_once('v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java',
                       'return "有效期：" + validity + "\\n版本：2.0.1";',
                       'return "有效期：" + validity + "\\n版本：2.0.2";')

          # Native WebView exact JS alert suppression.
          main_path = Path('v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java')
          main = main_path.read_text(encoding='utf-8')
          if 'import android.webkit.JsResult;' not in main:
              main = main.replace('import android.webkit.CookieManager;\n',
                                  'import android.webkit.CookieManager;\nimport android.webkit.JsResult;\n', 1)
          chrome_anchor = '''        webView.setWebChromeClient(new WebChromeClient() {\n            @Override\n            public void onProgressChanged(WebView view, int newProgress) {'''
          chrome_replacement = '''        webView.setWebChromeClient(new WebChromeClient() {\n            @Override\n            public boolean onJsAlert(WebView view, String url, String message, JsResult result) {\n                if (isSuppressedEngineReadyAlert(message)) {\n                    try {\n                        view.evaluateJavascript(\n                                "try{Object.defineProperty(window,'__gg_last_suppressed_alert__',{value:Object.freeze({message:'脚本加载完成~',at:Date.now(),source:'native-2.0.2'}),enumerable:false,configurable:true,writable:false});}catch(e){}",\n                                null);\n                    } catch (Throwable ignored) { }\n                    result.confirm();\n                    return true;\n                }\n                return super.onJsAlert(view, url, message, result);\n            }\n\n            @Override\n            public void onProgressChanged(WebView view, int newProgress) {'''
          if 'public boolean onJsAlert(WebView view, String url, String message, JsResult result)' not in main:
              if main.count(chrome_anchor) != 1:
                  raise SystemExit('MainActivity WebChromeClient anchor not found exactly once')
              main = main.replace(chrome_anchor, chrome_replacement, 1)
          helper_anchor = '''    private DownloadListener createDownloadListener() {'''
          helper_code = '''    private boolean isSuppressedEngineReadyAlert(String message) {\n        if (message == null) return false;\n        String normalized = message.trim().replace('～', '~');\n        return "脚本加载完成~".equals(normalized);\n    }\n\n    private DownloadListener createDownloadListener() {'''
          if 'private boolean isSuppressedEngineReadyAlert(String message)' not in main:
              if main.count(helper_anchor) != 1:
                  raise SystemExit('MainActivity helper anchor not found exactly once')
              main = main.replace(helper_anchor, helper_code, 1)
          main_path.write_text(main, encoding='utf-8')

          # Control script version.
          replace_once('remote-script/src/noname.js', '// @version      1.1.2', '// @version      1.1.3')

          # Engine-level runtime filter, protecting old clients as well.
          old_engine_path = Path('game-engine/release/game-1.0.4.js')
          engine_path = Path('game-engine/release/game-1.0.5.js')
          engine = old_engine_path.read_text(encoding='utf-8')
          marker = '/*1.0.4*/(function(){'
          if engine.count(marker) != 1:
              raise SystemExit('engine 1.0.4 prefix not found exactly once')
          filter_code = '''/*1.0.5*/(function(){try{var __ggGlobal=typeof window!=="undefined"?window:globalThis;if(!__ggGlobal.__gg_engine_alert_filter_installed__){var __ggOriginalAlert=__ggGlobal.alert;var __ggNormalizeAlert=function(value){return String(value==null?"":value).trim().replace(/～/g,"~");};var __ggFilteredAlert=function(message){if(__ggNormalizeAlert(message)==="脚本加载完成~"){try{Object.defineProperty(__ggGlobal,"__gg_last_suppressed_alert__",{value:Object.freeze({message:"脚本加载完成~",at:Date.now(),source:"engine-1.0.5"}),enumerable:false,configurable:true,writable:false});}catch(__ggRecordError){}return;}if(typeof __ggOriginalAlert==="function")return __ggOriginalAlert.apply(this,arguments);};Object.defineProperty(__ggGlobal,"__gg_engine_alert_filter_installed__",{value:Object.freeze({version:"1.0.5",installedAt:Date.now()}),enumerable:false,configurable:false,writable:false});__ggGlobal.alert=__ggFilteredAlert;}}catch(__ggAlertFilterError){}'''
          engine = engine.replace(marker, filter_code, 1)
          engine_path.write_text(engine, encoding='utf-8')

          # Engine manifest and compatibility.
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          engine_bytes = engine_path.read_bytes()
          manifest = {
              'schemaVersion': 1,
              'channel': 'stable',
              'version': 10005,
              'versionName': '1.0.5',
              'file': 'game-1.0.5.js',
              'sha256': hashlib.sha256(engine_bytes).hexdigest(),
              'size': len(engine_bytes),
              'sourceUrl': 'https://raw.githubusercontent.com/xianyumht-cmd/gams/main/game-engine/release/game-1.0.5.js',
              'minNonameVersion': '1.1.3',
              'publishedAt': now,
          }
          keys = ('schemaVersion','channel','version','versionName','file','sha256','size','sourceUrl','minNonameVersion','publishedAt')
          Path('/tmp/engine-canonical.txt').write_text(''.join(f'{k}={manifest[k]}\n' for k in keys), encoding='utf-8', newline='\n')
          Path('/tmp/engine-unsigned.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')

          compatibility_path = Path('game-engine/compatibility.json')
          compatibility = json.loads(compatibility_path.read_text(encoding='utf-8'))
          compatibility['stable']['nonameVersion'] = '1.1.3'
          compatibility['stable']['engineVersion'] = '1.0.5'
          compatibility['stable']['appMinVersion'] = 11
          compatibility_path.write_text(json.dumps(compatibility, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')
          PY

      - name: Sign engine and build signed encrypted runtime
        shell: bash
        run: |
          set -euo pipefail
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in remote-script/keys/private.pem.enc \
            -out /tmp/release-private.pem \
            -pass env:LICENSE_ADMIN_PASSWORD
          chmod 600 /tmp/release-private.pem

          openssl dgst -sha256 -sign /tmp/release-private.pem \
            -out /tmp/engine.sig /tmp/engine-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/engine.sig /tmp/engine-canonical.txt

          python3 - <<'PY'
          import base64, json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/engine-unsigned.json').read_text(encoding='utf-8'))
          manifest['signatureAlgorithm'] = 'SHA256withECDSA'
          manifest['signature'] = base64.b64encode(Path('/tmp/engine.sig').read_bytes()).decode('ascii')
          Path('game-engine/release/manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          python3 v2/runtime/tools/build_release.py \
            remote-script/src/noname.js \
            "game-engine/release/game-${ENGINE_VERSION}.js" \
            "$RUNTIME_VERSION" \
            "$LICENSE_ADMIN_PASSWORD" \
            v2/runtime/release

          openssl dgst -sha256 -sign /tmp/release-private.pem \
            -out /tmp/runtime.sig /tmp/v2-runtime-canonical.txt
          openssl dgst -sha256 -verify remote-script/keys/public.pem \
            -signature /tmp/runtime.sig /tmp/v2-runtime-canonical.txt

          python3 - <<'PY'
          import base64, json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/v2-runtime-unsigned.json').read_text(encoding='utf-8'))
          manifest['signatureAlgorithm'] = 'SHA256withECDSA'
          manifest['signature'] = base64.b64encode(Path('/tmp/runtime.sig').read_bytes()).decode('ascii')
          Path('v2/runtime/release/manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Verify complete release chain
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          main = Path('v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java').read_text(encoding='utf-8')
          noname = Path('remote-script/src/noname.js').read_bytes()
          engine = Path('game-engine/release/game-1.0.5.js').read_bytes()
          em = json.loads(Path('game-engine/release/manifest.json').read_text(encoding='utf-8'))
          rm = json.loads(Path('v2/runtime/release/manifest.json').read_text(encoding='utf-8'))
          bundle = Path('v2/runtime/release') / rm['file']
          assert 'versionCode = 11' in Path('v2/android/client/build.gradle.kts').read_text(encoding='utf-8')
          assert 'versionName = "2.0.2"' in Path('v2/android/client/build.gradle.kts').read_text(encoding='utf-8')
          assert 'onJsAlert(WebView view, String url, String message, JsResult result)' in main
          assert 'isSuppressedEngineReadyAlert' in main
          assert b'@version      1.1.3' in noname
          assert engine.startswith(b'/*1.0.5*/')
          assert engine.count(b'__gg_engine_alert_filter_installed__') == 2
          assert em['versionName'] == '1.0.5'
          assert em['sha256'] == hashlib.sha256(engine).hexdigest()
          assert rm['versionName'] == '2.0.2-r1'
          assert rm['gameSha256'] == hashlib.sha256(engine).hexdigest()
          assert rm['nonameSha256'] != hashlib.sha256(noname).hexdigest()
          assert bundle.stat().st_size == rm['size']
          assert hashlib.sha256(bundle.read_bytes()).hexdigest() == rm['sha256']
          PY

      - name: Commit formal source and runtime release
        shell: bash
        run: |
          set -euo pipefail
          rm -f /tmp/release-private.pem /tmp/engine.sig /tmp/runtime.sig \
            /tmp/engine-canonical.txt /tmp/engine-unsigned.json \
            /tmp/v2-runtime-canonical.txt /tmp/v2-runtime-unsigned.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            v2/android/client/build.gradle.kts \
            v2/android/client/src/main/java/com/jinli/ggsecure/MainActivity.java \
            v2/android/client/src/main/java/com/jinli/ggsecure/V2LicenseManager.java \
            remote-script/src/noname.js \
            game-engine/compatibility.json \
            game-engine/release/game-1.0.5.js \
            game-engine/release/manifest.json \
            v2/runtime/release
          git commit -m "Release GG 2.0.2 with exact loading alert suppression"
          git pull --rebase origin main
          git push origin HEAD:main
