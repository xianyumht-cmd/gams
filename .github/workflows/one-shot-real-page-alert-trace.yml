name: Trace real-page alert with APK routing
on:
  push:
    branches: [main]
    paths: [.github/workflows/one-shot-real-page-alert-trace.yml]
permissions:
  contents: write
jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Run real page with exact APK interception rules
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/trace.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const TARGET='https://m.66rpg.com/h5/1690283?ohp=v3&quality=32';
          const VIRTUAL='https://ggv2.local/runtime/game.js';
          const engine=fs.readFileSync('game-engine/release/game-1.0.3.js');
          let noname=fs.readFileSync('remote-script/src/noname.js','utf8');
          noname=noname.split('https://gams-script-edge.2320006072.workers.dev/engine/stable.js').join(VIRTUAL);
          const wrapped=`(function(){if(window.__GG_V2_CONTROL_LOADED__)return;window.__GG_V2_CONTROL_LOADED__=true;try{\n${noname}\n}catch(e){window.__GG_V2_CONTROL_LOADED__=false;console.error('[GG]',e);}})();`;
          const probe=`(()=>{const original=window.alert;Object.defineProperty(window,'__TRACE_ALERTS__',{value:[],configurable:true});window.alert=function(message){let current='';try{current=document.currentScript?.src||''}catch(_){};window.__TRACE_ALERTS__.push({message:String(message),currentScript:current,stack:String(new Error('alert trace').stack||''),page:location.href,at:Date.now()});};})();`;
          const isEngine=url=>{const x=String(url||'').toLowerCase();return x===VIRTUAL.toLowerCase()||x.includes('gams-script-edge.2320006072.workers.dev/engine/stable.js')||x.includes('space-z.ai/game.js')};
          const browser=await chromium.launch({headless:true,args:['--no-sandbox','--disable-dev-shm-usage']});
          const context=await browser.newContext({locale:'zh-CN',timezoneId:'Asia/Shanghai',viewport:{width:412,height:915},isMobile:true,hasTouch:true,ignoreHTTPSErrors:true,userAgent:'Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 Chrome/125.0.0.0 Mobile Safari/537.36'});
          await context.addInitScript({content:probe+'\n'+wrapped});
          const requests=[],responses=[],pageErrors=[],dialogs=[];
          await context.route('**/*',async route=>{const url=route.request().url();if(isEngine(url)){requests.push({url,type:route.request().resourceType(),intercepted:true});await route.fulfill({status:200,contentType:'application/javascript; charset=utf-8',headers:{'Cache-Control':'no-store','Access-Control-Allow-Origin':'*'},body:engine});return;}await route.continue();});
          const attach=p=>{p.on('request',r=>{if(!requests.some(x=>x.url===r.url()&&x.intercepted))requests.push({url:r.url(),type:r.resourceType(),intercepted:false})});p.on('response',r=>responses.push({url:r.url(),status:r.status(),type:r.request().resourceType()}));p.on('pageerror',e=>pageErrors.push(String(e.stack||e.message)));p.on('dialog',async d=>{dialogs.push({type:d.type(),message:d.message(),page:p.url()});await d.dismiss().catch(()=>{})})};
          context.on('page',attach);const page=await context.newPage();attach(page);
          let navigationError='';
          try{await page.goto(TARGET,{waitUntil:'domcontentloaded',timeout:90000});await page.waitForTimeout(12000);for(const label of ['无需下载','在线看','开始游戏','在线玩']){try{const b=page.getByText(label,{exact:false}).first();if(await b.isVisible({timeout:1500})){await b.click({timeout:5000});await page.waitForTimeout(6000)}}catch(_){}}await page.waitForTimeout(25000)}catch(e){navigationError=String(e.stack||e.message)}
          const alerts=[];for(const p of context.pages()){for(const frame of p.frames()){try{for(const a of await frame.evaluate(()=>window.__TRACE_ALERTS__||[]))alerts.push({...a,frame:frame.url()})}catch(_){}}}
          const report={target:TARGET,finalUrl:page.url(),navigationError,alerts,dialogs,engineRequests:requests.filter(x=>/game\.js|engine\/stable/i.test(x.url)),pageErrors:pageErrors.slice(0,50),responses:responses.filter(x=>/game\.js|engine\/stable/i.test(x.url))};
          fs.writeFileSync('/tmp/real-page-alert-trace.json',JSON.stringify(report,null,2));console.log(JSON.stringify(report,null,2));await browser.close();
          NODE
          node /tmp/trace.mjs
      - name: Commit trace and self-remove
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/diagnostics
          cp /tmp/real-page-alert-trace.json docs/diagnostics/real-page-alert-trace-20260723.json
          rm -f .github/workflows/one-shot-real-page-alert-trace.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Record real-page alert source trace'
          for i in 1 2 3; do git pull --rebase origin main || true; git push origin HEAD:main && exit 0; sleep 3; done
          exit 1
