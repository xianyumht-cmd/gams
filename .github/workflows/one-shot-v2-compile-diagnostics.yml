name: One-shot diagnose GG V2 Android compile

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'v2-server-authoritative'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v2-server-authoritative
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Compile and capture complete output
        working-directory: v2/android
        shell: bash
        run: |
          set +e
          gradle --no-daemon :client:assembleRelease :manager:assembleRelease > /tmp/v2-gradle.log 2>&1
          code=$?
          tail -n 120 /tmp/v2-gradle.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v2-gradle-diagnostics
          path: /tmp/v2-gradle.log
          retention-days: 3
          if-no-files-found: error
