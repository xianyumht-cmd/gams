name: Build two Android APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository quietly
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${GITHUB_REF}"
          git checkout -q FETCH_HEAD

      - name: Restore project payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib
          names = [
              "part00", "part01", "part02",
              "part03a", "part03b", "part03c", "part03d",
              "part04",
              "part05a", "part05b", "part05c", "part05d",
              "part06", "part07", "part08",
          ]
          expected = {
              "part03a": "55daa0b004d668fac704fcdafd4ed95e1f4972c8b21e4d9cdcbd4e45760f3a06",
              "part03b": "c15f08e8eed02a7def56ffadaab03263a14fe081802851987cffad3d64e1f7c4",
              "part03c": "832e962722e94114bba427ee0bb9c013d09514d91b7d786713399795e2c00937",
              "part03d": "3f1870c7564e9ae856945a14a724c02692708d2e209ffa0696ee621585a31256",
              "part05a": "43c475b28ae2f1d5e5d12bc718338a51dff4116ab8661c0ee2ac66a183c3064e",
              "part05b": "f45deca39cbe0398b3ce5d2209d0533c53198cfbd7a9c26b74eeb549de7c492f",
              "part05c": "7f1bcd7ab9310339247b7469a84de37af5a9c76fe39b5fe6cb073f38e523d3f2",
              "part05d": "ab252aed7f91fedeb9d6a6db184daae017d0fbed7248e464474ef837a7f45c65",
          }
          parts = [Path("payload_xz") / name for name in names]
          for part in parts:
              if not part.is_file():
                  raise SystemExit(f"Missing payload segment: {part.name}")
          for part in parts:
              cleaned = "".join(part.read_text(encoding="utf-8").split()).encode()
              digest = hashlib.sha256(cleaned).hexdigest()
              if part.name in expected and digest != expected[part.name]:
                  raise SystemExit(f"Checksum mismatch in {part.name}")
          text = "".join("".join(part.read_text(encoding="utf-8").split()) for part in parts)
          raw = base64.b64decode(text, validate=True)
          if hashlib.sha256(raw).hexdigest() != "aab22ffe5e49fbcb6ba9efa8f960aa90057644ae5a94511d2334704dbb92ea9d":
              raise SystemExit("Payload checksum mismatch")
          Path("project_payload.tar.xz").write_bytes(raw)
          PY
          tar -xJf project_payload.tar.xz

      - name: Prepare existing online clients
        shell: bash
        run: |
          set -euo pipefail
          cp client_patch/src/main/java/com/jinli/quickweb/RemoteScriptManager.java client/src/main/java/com/jinli/quickweb/RemoteScriptManager.java
          python3 client_patch/patch_client.py
          cp client_online_patch/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java client/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java
          cp client_online_patch/src/main/java/com/jinli/quickweb/ResilientApiTransport.java client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
          python3 client_online_patch/patch_client_online.py
          cp keygen_online_patch/src/main/java/com/jinli/keygen/MainActivity.java keygen/src/main/java/com/jinli/keygen/MainActivity.java
          cp keygen_online_patch/src/main/java/com/jinli/keygen/AdminApiManager.java keygen/src/main/java/com/jinli/keygen/AdminApiManager.java
          sed 's/package com.jinli.quickweb;/package com.jinli.keygen;/' client_online_patch/src/main/java/com/jinli/quickweb/ResilientApiTransport.java > keygen/src/main/java/com/jinli/keygen/ResilientApiTransport.java
          python3 keygen_online_patch/patch_keygen_online.py
          python3 license_endpoint_hotfix/patch_endpoints.py

      - name: Apply GG v1.4 and GG 管理器 v1.3.0
        shell: bash
        run: |
          set -o pipefail
          {
            set -eux
            target=client_hardening_patch/src/main/java/com/jinli/quickweb
            mkdir -p "$target"
            for name in SecureStore DeviceIdentity OnlineLicenseManager MainActivity; do
              cat "hardening_client_parts/${name}.java"/part* > "$target/${name}.java"
            done
            python3 client_hardening_patch/apply.py
            python3 client_control_center_patch/version.py
            python3 client_control_center_patch/activity_patch.py
            grep -q 'versionCode = 8' client/build.gradle.kts
            grep -q 'versionName = "1.4.0"' client/build.gradle.kts
            grep -q 'isMinifyEnabled = true' client/build.gradle.kts
            grep -q 'isShrinkResources = true' client/build.gradle.kts
            grep -q 'proguard-android-optimize.txt' client/build.gradle.kts
            grep -q -- '-repackageclasses g' client/proguard-rules.pro
            grep -q 'android:label="GG"' client/src/main/AndroidManifest.xml
            grep -q 'android:allowBackup="false"' client/src/main/AndroidManifest.xml
            grep -q 'AndroidKeyStore' client/src/main/java/com/jinli/quickweb/DeviceIdentity.java
            grep -q 'AES/GCM/NoPadding' client/src/main/java/com/jinli/quickweb/SecureStore.java
            grep -q 'foregroundRecheckSeconds' client/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java
            grep -q 'latestAppVersion' client/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java
            grep -q 'showUpdateDialog' client/src/main/java/com/jinli/quickweb/MainActivity.java
            grep -q 'RuntimeNames.customHost' client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
            test ! -e client/src/main/assets/noname.js
            test -s client/src/main/res/drawable/ic_launcher_foreground.xml
            grep -q 'versionCode = 7' keygen/build.gradle.kts
            grep -q 'versionName = "1.3.0"' keygen/build.gradle.kts
            grep -q 'isMinifyEnabled = true' keygen/build.gradle.kts
            grep -q 'isShrinkResources = true' keygen/build.gradle.kts
            grep -q -- '-repackageclasses g' keygen/proguard-rules.pro
            grep -q 'android:label="GG 管理器"' keygen/src/main/AndroidManifest.xml
          } 2>&1 | tee /tmp/apply-v14.log

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APKs
        shell: bash
        run: |
          set -o pipefail
          gradle :client:assembleRelease :keygen:assembleRelease --stacktrace 2>&1 | tee /tmp/gradle-build.log

      - name: Sign APKs with fixed GG release key
        shell: bash
        env:
          GG_RELEASE_KEYSTORE_BASE64: ${{ secrets.GG_RELEASE_KEYSTORE_BASE64 }}
          GG_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.GG_RELEASE_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${GG_RELEASE_KEYSTORE_BASE64:-}" || -z "${GG_RELEASE_KEYSTORE_PASSWORD:-}" ]]; then
            echo "::error::Missing GG_RELEASE_KEYSTORE_BASE64 or GG_RELEASE_KEYSTORE_PASSWORD repository secret"
            exit 1
          fi

          client_apk="client/build/outputs/apk/release/client-release.apk"
          admin_apk="keygen/build/outputs/apk/release/keygen-release.apk"
          test -s "$client_apk"
          test -s "$admin_apk"

          keystore="$RUNNER_TEMP/GG-release.jks"
          printf '%s' "$GG_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 600 "$keystore"
          keytool -list \
            -keystore "$keystore" \
            -storepass "$GG_RELEASE_KEYSTORE_PASSWORD" \
            -alias gg-release >/dev/null

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          apksigner="$build_tools/apksigner"
          test -x "$apksigner"

          sign_apk() {
            local input="$1"
            local output="${input%.apk}-fixed-signed.apk"
            "$apksigner" sign \
              --ks "$keystore" \
              --ks-key-alias gg-release \
              --ks-pass env:GG_RELEASE_KEYSTORE_PASSWORD \
              --key-pass env:GG_RELEASE_KEYSTORE_PASSWORD \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --v4-signing-enabled false \
              --out "$output" \
              "$input"
            mv "$output" "$input"
          }

          sign_apk "$client_apk"
          sign_apk "$admin_apk"
          rm -f "$keystore"

      - name: Verify fixed signature and rename APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          client_apk="client/build/outputs/apk/release/client-release.apk"
          admin_apk="keygen/build/outputs/apk/release/keygen-release.apk"
          expected_cert="F220C5D47513C744CB9B5F17C0F8F39B0C109F8F7DC892989713EEF33FDBE0C4"
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          apksigner="$build_tools/apksigner"

          test -s client/build/outputs/mapping/release/mapping.txt
          test -s keygen/build/outputs/mapping/release/mapping.txt
          unzip -l "$client_apk" > /tmp/client-files.txt
          if grep -q 'assets/noname.js' /tmp/client-files.txt; then exit 1; fi
          unzip -p "$client_apk" classes.dex > /tmp/client.dex
          if strings /tmp/client.dex | grep -q 'Lcom/jinli/quickweb/OnlineLicenseManager;'; then exit 1; fi
          if strings /tmp/client.dex | grep -q 'gams-license-api.2320006072.workers.dev'; then exit 1; fi
          if strings /tmp/client.dex | grep -q 'license.xn--8pv109c.top'; then exit 1; fi

          "$apksigner" verify --verbose --print-certs "$client_apk" | tee /tmp/client-signature.txt
          "$apksigner" verify --verbose --print-certs "$admin_apk" | tee /tmp/admin-signature.txt

          for log in /tmp/client-signature.txt /tmp/admin-signature.txt; do
            grep -q 'Verified using v1 scheme.*true' "$log"
            grep -q 'Verified using v2 scheme.*true' "$log"
            grep -q 'Verified using v3 scheme.*true' "$log"
          done

          client_cert="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' /tmp/client-signature.txt | head -n 1 | tr -d ':' | tr '[:lower:]' '[:upper:]')"
          admin_cert="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' /tmp/admin-signature.txt | head -n 1 | tr -d ':' | tr '[:lower:]' '[:upper:]')"
          test "$client_cert" = "$expected_cert"
          test "$admin_cert" = "$expected_cert"

          cp "$client_apk" "dist/GG-v1.4.0-固定正式签名版.apk"
          cp "$admin_apk" "dist/GG-管理器-v1.3.0-固定正式签名版.apk"
          printf '%s\n' "$expected_cert" > dist/SIGNING_CERT_SHA256.txt
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GG-fixed-release-signing-build-diagnostics
          path: |
            /tmp/apply-v14.log
            /tmp/gradle-build.log
            /tmp/client-signature.txt
            /tmp/admin-signature.txt
          if-no-files-found: warn
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: GG-fixed-release-signed
          path: dist/*
          if-no-files-found: error
          retention-days: 30
