name: Build two Android APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository quietly
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${GITHUB_REF}"
          git checkout -q FETCH_HEAD

      - name: Restore project payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib

          names = [
              "part00", "part01", "part02",
              "part03a", "part03b", "part03c", "part03d",
              "part04",
              "part05a", "part05b", "part05c", "part05d",
              "part06", "part07", "part08",
          ]
          expected = {
              "part03a": "55daa0b004d668fac704fcdafd4ed95e1f4972c8b21e4d9cdcbd4e45760f3a06",
              "part03b": "c15f08e8eed02a7def56ffadaab03263a14fe081802851987cffad3d64e1f7c4",
              "part03c": "832e962722e94114bba427ee0bb9c013d09514d91b7d786713399795e2c00937",
              "part03d": "3f1870c7564e9ae856945a14a724c02692708d2e209ffa0696ee621585a31256",
              "part05a": "43c475b28ae2f1d5e5d12bc718338a51dff4116ab8661c0ee2ac66a183c3064e",
              "part05b": "f45deca39cbe0398b3ce5d2209d0533c53198cfbd7a9c26b74eeb549de7c492f",
              "part05c": "7f1bcd7ab9310339247b7469a84de37af5a9c76fe39b5fe6cb073f38e523d3f2",
              "part05d": "ab252aed7f91fedeb9d6a6db184daae017d0fbed7248e464474ef837a7f45c65",
          }
          parts = [Path("payload_xz") / name for name in names]
          for part in parts:
              if not part.is_file():
                  raise SystemExit(f"Missing payload segment: {part.name}")
          for part in parts:
              cleaned = "".join(part.read_text(encoding="utf-8").split()).encode()
              digest = hashlib.sha256(cleaned).hexdigest()
              if part.name in expected and digest != expected[part.name]:
                  raise SystemExit(f"Checksum mismatch in {part.name}")
          text = "".join("".join(part.read_text(encoding="utf-8").split()) for part in parts)
          raw = base64.b64decode(text, validate=True)
          digest = hashlib.sha256(raw).hexdigest()
          if digest != "aab22ffe5e49fbcb6ba9efa8f960aa90057644ae5a94511d2334704dbb92ea9d":
              raise SystemExit("Payload checksum mismatch")
          Path("project_payload.tar.xz").write_bytes(raw)
          PY
          tar -xJf project_payload.tar.xz
          test -s client/src/main/assets/noname.js
          test -s client/src/main/java/com/jinli/quickweb/MainActivity.java
          test -s keygen/src/main/java/com/jinli/keygen/MainActivity.java

      - name: Apply signed remote script client patch
        shell: bash
        run: |
          set -euo pipefail
          cp client_patch/src/main/java/com/jinli/quickweb/RemoteScriptManager.java \
            client/src/main/java/com/jinli/quickweb/RemoteScriptManager.java
          python3 client_patch/patch_client.py

          grep -q 'versionCode = 2' client/build.gradle.kts
          grep -q 'versionName = "1.1.0"' client/build.gradle.kts
          grep -q 'gams-script-edge.2320006072.workers.dev' \
            client/src/main/java/com/jinli/quickweb/RemoteScriptManager.java
          grep -q 'SHA256withECDSA' \
            client/src/main/java/com/jinli/quickweb/RemoteScriptManager.java
          grep -q 'refreshAsync' client/src/main/java/com/jinli/quickweb/MainActivity.java

      - name: Apply resilient online license patches
        shell: bash
        run: |
          set -euo pipefail
          cp client_online_patch/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java \
            client/src/main/java/com/jinli/quickweb/OnlineLicenseManager.java
          cp client_online_patch/src/main/java/com/jinli/quickweb/ResilientApiTransport.java \
            client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
          python3 client_online_patch/patch_client_online.py

          cp keygen_online_patch/src/main/java/com/jinli/keygen/MainActivity.java \
            keygen/src/main/java/com/jinli/keygen/MainActivity.java
          cp keygen_online_patch/src/main/java/com/jinli/keygen/AdminApiManager.java \
            keygen/src/main/java/com/jinli/keygen/AdminApiManager.java
          sed 's/package com.jinli.quickweb;/package com.jinli.keygen;/' \
            client_online_patch/src/main/java/com/jinli/quickweb/ResilientApiTransport.java \
            > keygen/src/main/java/com/jinli/keygen/ResilientApiTransport.java
          python3 keygen_online_patch/patch_keygen_online.py
          python3 license_endpoint_hotfix/patch_endpoints.py

          grep -q 'versionCode = 5' client/build.gradle.kts
          grep -q 'versionName = "1.2.2"' client/build.gradle.kts
          grep -q 'CUSTOM_HOST = "license.xn--8pv109c.top"' \
            client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
          grep -q 'WORKER_HOST = "gams-license-api.2320006072.workers.dev"' \
            client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
          grep -q 'DNS_RESOLVERS' \
            client/src/main/java/com/jinli/quickweb/ResilientApiTransport.java
          ! grep -q 'class LicenseCodec' client/src/main/java/com/jinli/quickweb/MainActivity.java
          grep -q 'android.permission.INTERNET' keygen/src/main/AndroidManifest.xml
          grep -q 'versionCode = 4' keygen/build.gradle.kts
          grep -q 'versionName = "1.1.2"' keygen/build.gradle.kts
          grep -q 'package com.jinli.keygen;' \
            keygen/src/main/java/com/jinli/keygen/ResilientApiTransport.java

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APKs
        run: gradle :client:assembleRelease :keygen:assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p dist
          cp client/build/outputs/apk/release/client-release.apk "dist/快捷工具-客户端-联网授权-v1.2.2.apk"
          cp keygen/build/outputs/apk/release/keygen-release.apk "dist/在线卡密管理器-v1.1.2.apk"
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: Android-联网授权-多通道修复版
          path: dist/*
          if-no-files-found: error
          retention-days: 30
