name: Build two Android APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main", "android-license-suite" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Restore project payload
        shell: bash
        run: |
          set -euxo pipefail
          sha256sum payload_xz/part*
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib

          parts = sorted(Path("payload_xz").glob("part*"))
          if len(parts) != 12:
              raise SystemExit(f"Expected 12 payload parts, found {len(parts)}")
          text = "".join("".join(p.read_text(encoding="utf-8").split()) for p in parts)
          raw = base64.b64decode(text, validate=True)
          digest = hashlib.sha256(raw).hexdigest()
          print("payload base64 chars:", len(text))
          print("payload bytes:", len(raw))
          print("payload sha256:", digest)
          if digest != "aab22ffe5e49fbcb6ba9efa8f960aa90057644ae5a94511d2334704dbb92ea9d":
              raise SystemExit("Payload checksum mismatch")
          Path("project_payload.tar.xz").write_bytes(raw)
          PY
          tar -xJvf project_payload.tar.xz
          test -s client/src/main/assets/noname.js
          test -s client/src/main/java/com/jinli/quickweb/MainActivity.java
          test -s keygen/src/main/java/com/jinli/keygen/MainActivity.java

      - name: Build release APKs
        run: gradle :client:assembleRelease :keygen:assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p dist
          cp client/build/outputs/apk/release/client-release.apk "dist/快捷工具-客户端.apk"
          cp keygen/build/outputs/apk/release/keygen-release.apk "dist/卡密生成器-管理员.apk"
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: Android-双APK安装包
          path: dist/*
          if-no-files-found: error
          retention-days: 30
