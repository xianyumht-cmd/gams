name: Generate signed remote script artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-remote-script-artifact.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KEY_PASSWORD: ${{ secrets.LICENSE_ADMIN_PASSWORD }}
    steps:
      - name: Checkout repository like APK build
        shell: bash
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth 1 origin "${GITHUB_REF}"
          git checkout -q FETCH_HEAD

      - name: Validate signing password
        shell: bash
        run: |
          set -euo pipefail
          test -n "${KEY_PASSWORD:-}" || { echo "LICENSE_ADMIN_PASSWORD is missing"; exit 1; }

      - name: Restore current bundled script
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          names = [
              "part00", "part01", "part02",
              "part03a", "part03b", "part03c", "part03d",
              "part04",
              "part05a", "part05b", "part05c", "part05d",
              "part06", "part07", "part08",
          ]
          text = "".join("".join((Path("payload_xz") / n).read_text(encoding="utf-8").split()) for n in names)
          Path("/tmp/project_payload.tar.xz").write_bytes(base64.b64decode(text, validate=True))
          PY
          mkdir -p /tmp/project_payload
          tar -xJf /tmp/project_payload.tar.xz -C /tmp/project_payload
          test -s /tmp/project_payload/client/src/main/assets/noname.js
          mkdir -p remote-script/src remote-script/release remote-script/keys
          cp /tmp/project_payload/client/src/main/assets/noname.js remote-script/src/noname.js

      - name: Generate encrypted signing key
        shell: bash
        run: |
          set -euo pipefail
          openssl ecparam -name prime256v1 -genkey -noout -out /tmp/script-private.pem
          openssl ec -in /tmp/script-private.pem -pubout -out remote-script/keys/public.pem
          openssl pkey -pubin -in remote-script/keys/public.pem -outform DER -out remote-script/keys/public.der
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in /tmp/script-private.pem \
            -out remote-script/keys/private.pem.enc \
            -pass env:KEY_PASSWORD

      - name: Build signed release
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, json, re
          from datetime import datetime, timezone
          source = Path("remote-script/src/noname.js")
          text = source.read_text(encoding="utf-8")
          m = re.search(r"^//\s*@version\s+([^\s]+)", text, re.MULTILINE)
          version_name = m.group(1) if m else "1.0.0"
          nums = [int(x) for x in re.findall(r"\d+", version_name)[:3]]
          while len(nums) < 3:
              nums.append(0)
          version = nums[0] * 10000 + nums[1] * 100 + nums[2]
          filename = f"noname-{version_name}.js"
          release = Path("remote-script/release") / filename
          release.write_bytes(source.read_bytes())
          manifest = {
              "schemaVersion": 1,
              "channel": "stable",
              "version": version,
              "versionName": version_name,
              "file": filename,
              "sha256": hashlib.sha256(release.read_bytes()).hexdigest(),
              "size": release.stat().st_size,
              "minAppVersion": 1,
              "publishedAt": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
          }
          keys = ("schemaVersion", "channel", "version", "versionName", "file", "sha256", "size", "minAppVersion", "publishedAt")
          Path("/tmp/canonical.txt").write_text("".join(f"{k}={manifest[k]}\n" for k in keys), encoding="utf-8", newline="\n")
          Path("/tmp/manifest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          openssl dgst -sha256 -sign /tmp/script-private.pem -out /tmp/manifest.sig /tmp/canonical.txt
          python3 - <<'PY'
          from pathlib import Path
          import base64, json
          manifest = json.loads(Path("/tmp/manifest.json").read_text(encoding="utf-8"))
          manifest["signatureAlgorithm"] = "SHA256withECDSA"
          manifest["signature"] = base64.b64encode(Path("/tmp/manifest.sig").read_bytes()).decode("ascii")
          Path("remote-script/release/manifest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          rm -f /tmp/script-private.pem /tmp/manifest.sig /tmp/canonical.txt /tmp/manifest.json

      - name: Upload signed release
        uses: actions/upload-artifact@v4
        with:
          name: signed-remote-script-release
          path: remote-script
          retention-days: 1
