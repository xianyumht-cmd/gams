name: Deploy signed script edge
# One-shot verification trigger for self-hosted engine rollout

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - script-edge/**
      - .github/workflows/deploy-script-edge.yml
  pull_request:
    branches:
      - main
    paths:
      - script-edge/**
      - .github/workflows/deploy-script-edge.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is missing"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is missing"; exit 1; }
      - name: Deploy Worker
        working-directory: script-edge
        run: npx --yes wrangler@4 deploy --config wrangler.jsonc
      - name: Verify deployed script and engine endpoints
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://gams-script-edge.2320006072.workers.dev"

          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            "${endpoint}/health" > /tmp/health.json
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            "${endpoint}/release/manifest.json" > /tmp/script-manifest.json
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            "${endpoint}/engine/manifest.json" > /tmp/engine-manifest.json
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            "${endpoint}/engine/stable.js" > /tmp/stable-game.js

          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          health = json.loads(Path('/tmp/health.json').read_text(encoding='utf-8'))
          assert health['ok'] is True
          assert health['service'] == 'signed-script-edge'
          assert health.get('engineHosting') is True

          script = json.loads(Path('/tmp/script-manifest.json').read_text(encoding='utf-8'))
          assert script['schemaVersion'] == 1
          assert script['signatureAlgorithm'] == 'SHA256withECDSA'
          assert len(script['sha256']) == 64

          engine = json.loads(Path('/tmp/engine-manifest.json').read_text(encoding='utf-8'))
          body = Path('/tmp/stable-game.js').read_bytes()
          assert engine['schemaVersion'] == 1
          assert engine['signatureAlgorithm'] == 'SHA256withECDSA'
          assert len(body) == engine['size'], (len(body), engine['size'])
          assert hashlib.sha256(body).hexdigest() == engine['sha256']

          print('verified remote script:', script['versionName'])
          print('verified remote engine:', engine['versionName'], len(body), engine['sha256'])
          PY
