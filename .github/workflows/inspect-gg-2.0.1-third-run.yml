name: Inspect GG 2.0.1 third run
on:
  push:
    branches: [diag/fixed-jks-inventory]
    paths: [.github/workflows/inspect-gg-2.0.1-third-run.yml]
permissions:
  actions: read
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=ebffa8c0381f739e3bd0c5627ec270d8c4f71160&per_page=20" > /tmp/runs.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('/tmp/runs.json').read_text())
          rows=[{k:r.get(k) for k in ('id','name','status','conclusion','html_url','created_at','updated_at')} for r in d.get('workflow_runs',[])]
          Path('diagnostics/gg-2.0.1-third-runs.json').parent.mkdir(parents=True,exist_ok=True)
          Path('diagnostics/gg-2.0.1-third-runs.json').write_text(json.dumps(rows,indent=2)+'\n')
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/gg-2.0.1-third-runs.json
          git commit -m "Record GG 2.0.1 third run status"
          git push
